/* ═══════════════════════════════════════════════════════════
   CHAT INPUT
════════════════════════════════════════════════════════════ */
function ChatInput({ onSend, onUpload, loading, lang = 'en', disabled = false, registerAutoMic }) {
  const [text, setText] = useState('');
  const taRef = useRef(null);
  const { listening, transcript, supported: micSupported, start, stop } = useSpeechRecognition(lang);

  const send = () => {
    const t = text.trim();
    if (!t || loading || disabled) return;
    onSend(t);
    setText('');
    if (taRef.current) taRef.current.style.height = 'auto';
  };

  const onKey = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  };

  const toggleMic = useCallback(() => {
    if (listening) { stop(); return; }
    // ChatInput doesn't know the pending quiz key — but capturing pitch is
    // harmless. Enable it always; the backend ignores it for non-gender answers.
    start((t, pitch) => { if (t) onSend(t, 'text', null, null, pitch); },
          { capturePitch: true });
  }, [listening, start, stop, onSend]);

  useEffect(() => {
    if (!registerAutoMic) return;
    const trigger = () => {
      if (disabled || loading || !micSupported) return;
      if (!listening) start((t, pitch) => { if (t) onSend(t, 'text', null, null, pitch); },
                            { capturePitch: true });
    };
    registerAutoMic(trigger);
    return () => registerAutoMic(null);
  }, [registerAutoMic, disabled, loading, micSupported, listening, start, onSend]);

  const resize = (e) => {
    e.target.style.height = 'auto';
    e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px';
  };

  return (
    <div className="px-3 py-3" style={{ borderTop: '1px solid rgba(0,195,195,.1)', background: '#070E1C' }}>
      <div className="flex items-end gap-2 rounded-2xl px-3 py-2.5"
           style={{ background: '#0D1B2E', border: '1.5px solid rgba(0,195,195,.2)' }}>

        {/* Upload button */}
        <button onClick={onUpload} disabled={loading || disabled}
                title="Upload photo for face analysis"
                className="flex-shrink-0 w-8 h-8 rounded-lg flex items-center justify-center text-sm transition-all"
                style={{ background: 'rgba(0,195,195,.1)', color: '#00C3C3' }}>
          📷
        </button>

        {/* Mic button */}
        {micSupported && (
          <button onClick={toggleMic} disabled={loading || disabled}
                  title={listening ? (I18N[lang]?.stopSpeaking || 'Stop') : (I18N[lang]?.speakLabel || 'Speak')}
                  className="flex-shrink-0 w-8 h-8 rounded-lg flex items-center justify-center text-sm transition-all"
                  style={listening
                    ? { background: '#ef4444', color: '#fff', animation: 'glow 1.2s infinite' }
                    : { background: 'rgba(0,195,195,.1)', color: '#00C3C3' }}>
            {listening ? '🛑' : '🎤'}
          </button>
        )}

        {/* Textarea */}
        <textarea ref={taRef} value={listening ? (transcript || '🎤 listening…') : text}
                  onChange={(e) => { if (!listening) { setText(e.target.value); resize(e); } }}
                  onKeyDown={onKey}
                  placeholder={listening
                    ? (lang === 'hi' ? 'बोलिए…' : 'Listening…')
                    : (disabled
                        ? 'Please choose a language above to begin…'
                        : (lang === 'hi'
                            ? 'Claire से कुछ भी पूछें — चेहरा, लेंस, फ्रेम…'
                            : 'Ask Claire anything — your face shape, lens advice, frames…'))}
                  rows={1}
                  className="flex-1 bg-transparent text-sm text-white placeholder-slate-500 resize-none outline-none leading-relaxed"
                  style={{ minHeight: 28, maxHeight: 120 }}
                  disabled={loading || disabled || listening} />

        {/* Send button */}
        <button onClick={send} disabled={!text.trim() || loading}
                className="flex-shrink-0 w-8 h-8 rounded-lg flex items-center justify-center text-sm transition-all btn-teal disabled:opacity-30">
          {loading
            ? <span className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full spin" />
            : '▶'}
        </button>
      </div>

      <p className="text-xs text-slate-600 mt-1.5 px-1">Press Enter to send · Shift+Enter for new line</p>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   MAIN APP
════════════════════════════════════════════════════════════ */
function App() {
  const [messages, setMessages]     = useState([]);
  const [loading, setLoading]       = useState(false);
  const [showUpload, setShowUpload] = useState(false);
  const [showCart, setShowCart]     = useState(false);
  const [showLive, setShowLive]     = useState(false);
  const [faceData, setFaceData]     = useState(null);
  const [cart, setCart]             = useState([]);
  const [lang, setLang]             = useState(() => {
    try { return sessionStorage.getItem('claire_lang') || null; } catch { return null; }
  });
  const [mode, setMode]             = useState(() => {
    try { return sessionStorage.getItem('claire_mode') || 'hybrid'; } catch { return 'hybrid'; }
  });
  const [sessionData, setSessionData] = useState({
    quiz_step: 0, quiz_answers: {}, face_data: null, last_shown: null
  });

  const messagesEndRef = useRef(null);

  const scrollToBottom = () => {
    messagesEndRef.current?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  };

  useEffect(() => { scrollToBottom(); }, [messages, loading]);

  // Prime speechSynthesis voice list (some browsers load async)
  useEffect(() => {
    if (!('speechSynthesis' in window)) return;
    const prime = () => window.speechSynthesis.getVoices();
    prime();
    window.speechSynthesis.addEventListener?.('voiceschanged', prime);
    return () => window.speechSynthesis.removeEventListener?.('voiceschanged', prime);
  }, []);

  // ── Pick language + mode first ──
  const pickLanguage = useCallback((l, m = 'hybrid') => {
    setLang(l);
    setMode(m);
    try { sessionStorage.setItem('claire_lang', l); } catch {}
    try { sessionStorage.setItem('claire_mode', m); } catch {}
    try { window.speechSynthesis.resume(); } catch {}

    // Speak a short agent introduction first. When it finishes, fire the
    // greeting — this way the greeting's TTS doesn't cut off the intro.
    const agentIntro = l === 'hi'
      ? 'नमस्ते! मैं Claire हूँ, Lenskart की आपकी personal eyewear stylist। चलिए शुरू करते हैं।'
      : "Hi! I'm Claire, your personal eyewear stylist at Lenskart. Let's get started.";

    speak(agentIntro, l, () => {
      // Greeting fires only after the intro audio has truly ended.
      setTimeout(() => sendMessage('hello', 'greet', null, l), 200);
    });
  }, []);

  // Greet is fired by pickLanguage; no separate auto-greet effect needed.

  // ── Auto-speak new assistant messages + hands-free mic handoff ──
  const _spokenRef = useRef(new Set());
  const _autoMicRef = useRef(null); // set by ChatInput / VoiceOnlyView
  const _handleQuizAnswerRef = useRef(null); // set after handleQuizAnswer is defined
  useEffect(() => {
    if (!lang) return;
    const last = messages[messages.length - 1];
    if (!last || last.role !== 'assistant' || _spokenRef.current.has(last.id)) return;
    _spokenRef.current.add(last.id);
    const q = (last.components || []).find(c => c.type === 'quiz');

    // Build the utterance — the question itself is now self-contained, so
    // speak the question when available, otherwise the message text.
    // This avoids the old bug of speaking intro + question twice.
    let say;
    if (q) {
      // If assistant text is a short acknowledgement (e.g. "Got it."), prepend it;
      // otherwise the question already contains everything needed.
      const t = (last.text || '').trim();
      const textIsShort = t.length > 0 && t.length < 60 && !/\?/.test(t);
      say = textIsShort ? `${t} ${q.question}` : q.question;
    } else {
      say = last.text || '';
    }
    if (!say.trim()) return;

    speak(say, lang, () => {
      if (q && _autoMicRef.current) {
        setTimeout(() => {
          if (isSpeaking()) return;
          _autoMicRef.current?.();
        }, 350);
      }
    });
  }, [messages, lang]);

  // Short salesman-style acknowledgement to play before advancing
  const speakAck = useCallback(() => {
    if (!lang) return Promise.resolve();
    const acks = lang === 'hi'
      ? ["अच्छा, समझ गई!", "बिल्कुल सही!", "वाह!", "ठीक है!"]
      : ["Got it!", "Perfect!", "Nice choice!", "Okay!"];
    const pick = acks[Math.floor(Math.random() * acks.length)];
    return speak(pick, lang);
  }, [lang]);

  const now = () => new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });

  // ── Client-side demo responses (quiz flow, no backend needed) ──
  const clientDemoReply = useCallback((text, type, sd) => {
    const t = text.toLowerCase();
    const step = sd.quiz_step || 0;
    const L = I18N[lang] || I18N.en;  // active language pack

    // ── Filter-query detection (client-side when backend is down) ──
    if (type !== 'greet' && type !== 'quiz_answer') {
      const quizBlob = Object.values(sd.quiz_answers || {}).join(' ');
      const quizTags = quizBlob ? extractTagsFromText(quizBlob) : {};
      const newTags  = extractTagsFromText(text);
      const tags = { ...(sd.active_filters || {}) };
      for (const [k, v] of Object.entries(quizTags)) { if (v != null && !tags[k]) tags[k] = v; }
      for (const [k, v] of Object.entries(newTags))  { if (v != null) tags[k] = v; }
      const hasTag = Object.values(tags).some(v => v != null);
      if (hasTag) {
        let filtered = [...CLIENT_FRAMES];
        const hints = [];
        if (tags.budget === 'under_500')       { filtered = filtered.filter(f => f.price <= 500);  hints.push('under ₹500'); }
        else if (tags.budget === 'under_1000') { filtered = filtered.filter(f => f.price <= 1000); hints.push('under ₹1000'); }
        else if (tags.budget === 'under_1500') { filtered = filtered.filter(f => f.price <= 1500); hints.push('under ₹1500'); }
        else if (tags.budget === 'under_2000') { filtered = filtered.filter(f => f.price <= 2000); hints.push('under ₹2000'); }
        else if (tags.budget === 'under_2500') { filtered = filtered.filter(f => f.price <= 2500); hints.push('under ₹2500'); }
        else if (tags.budget === 'under_3000') { filtered = filtered.filter(f => f.price <= 3000); hints.push('under ₹3000'); }
        else if (tags.budget === 'above_3000') { filtered = filtered.filter(f => f.price >= 3000); hints.push('premium'); }

        if (tags.color_type === 'dark')  { filtered = filtered.filter(f => /black|navy|gunmetal|matte/i.test(f.color||'')); hints.push('dark'); }
        if (tags.color_type === 'light') { filtered = filtered.filter(f => /clear|white|silver|rose|gold/i.test(f.color||'')); hints.push('light'); }

        if (tags.product_type === 'sunglasses')   { filtered = filtered.filter(f => (f.type||'eyeglasses')==='sunglasses'); hints.push('sunglasses'); }
        if (tags.product_type === 'contact_lens') { filtered = filtered.filter(f => f.type==='contact_lens'); hints.push('contacts'); }

        if (!filtered.length) {
          return { text: `🔍 No products found matching ${hints.join(' + ') || 'your criteria'}. Try different filters!`, components: [] };
        }
        const desc = hints.length ? hints.join(' + ') : 'your criteria';
        return {
          text: `🎯 Filters: **${desc}** — ${filtered.length} products:`,
          components: [{ type:'carousel', title:'Search Results', frames: filtered.slice(0, 6) }]
        };
      }
    }
    const QUIZ_STEPS = L.quiz;

    // Lens keywords
    if (['lens','prescription','power','coating','anti-glare','blue light','screen'].some(k => t.includes(k))) {
      const LENS_PKGS = [
        { id:'LENS-BLU', name:'BluBlock Pro', tagline:'Shield Your Eyes from Digital Strain', price:699, original_price:1299, badge:'Most Popular', description:'Advanced blue-light blocking coating that reduces digital eye strain by up to 85%.', features:['Blue light blocking','Anti-glare','UV 400 protection','Scratch resistant'] },
        { id:'LENS-SV',  name:'ClearVision Single', tagline:'Crystal-Clear Single Vision',  price:499, original_price:999,  badge:null, description:'Premium 1.56 index single vision lenses with anti-reflective coating.', features:['Anti-reflective','UV protection','Scratch resistant','Lightweight'] },
        { id:'LENS-PROG',name:'Progressive Elite', tagline:'See All Distances, Seamlessly', price:2499, original_price:4999, badge:'Premium', description:'Premium progressive multifocal lenses with wide corridors for effortless vision.', features:['Wide corridors','No-line bifocal','Anti-reflective','UV 400'] },
      ];
      return { text:'Here are my top lens recommendations for you:', components:[{ type:'lens_rec', packages:LENS_PKGS, reasoning:['BluBlock is essential for 4+ hours of daily screen time.','ClearVision Single is the best value for mild prescriptions.'] }] };
    }

    // Fit score request
    if (['fit','confidence','score','match','how well'].some(k => t.includes(k))) {
      const shape = sd.face_data?.shape || 'Oval';
      return { text:`Here's your fit analysis for the Horizon Classic based on your **${shape}** face shape:`, components:[{ type:'fit_score', frame_id:'LK-HC-001', frame_name:'Horizon Classic', score:shape==='Oval'?94:shape==='Round'?72:82, verdict:shape==='Oval'?'Perfect Match':'Great Fit', reasons:['Excellent shape compatibility for your face type','Frame width is proportionally balanced','Classic black colorway suits all skin tones'] }] };
    }

    // Show frames
    if (['show','frame','recommend','browse','catalog','option'].some(k => t.includes(k)) || type === 'greet') {
      const shape = sd.face_data?.shape;
      const frames = clientSearchFrames(shape, 6);
      if (type === 'greet') {
        const q0 = QUIZ_STEPS[0];
        return { text: L.intro,
                 components:[{ type:'quiz', question: q0.q, options: q0.opts, step: 1, total: QUIZ_STEPS.length, key: q0.key }] };
      }
      const showText = lang === 'hi'
        ? `ये रहे कुछ बढ़िया फ्रेम${shape ? ` आपके ${shape} चेहरे के लिए` : ''} — 🎯 पर टैप करके फिट स्कोर देखें!`
        : `Here are some great frames${shape ? ` for your ${shape} face shape` : ''} — tap 🎯 on any card for your personal fit score!`;
      const showTitle = lang === 'hi'
        ? (shape ? `${shape} चेहरे के लिए बेस्ट` : 'आपके लिए टॉप पिक्स')
        : (shape ? `Best frames for ${shape} face shape` : 'Top picks for you');
      return { text: showText, components:[{ type:'carousel', title: showTitle, frames }] };
    }

    // Quiz answer — advance steps.
    // `step` = number of questions already answered (1..7). Next question index = step.
    const TOTAL = QUIZ_STEPS.length; // now 7
    if (step < TOTAL) {
      const s = QUIZ_STEPS[step]; // 0-indexed; step=1 → QUIZ_STEPS[1]
      // Short ack per transition. Questions are self-contained, so these
      // intros stay short to avoid repeating the question.
      // Order transitions: gender→age→type→lifestyle→style→color→budget→vision
      const intros = lang === 'hi'
        ? ['समझ गई।', 'ठीक है।', 'बढ़िया।', 'अच्छा।', 'बहुत सही।', 'ओके।', 'आख़िरी बात।']
        : ["Got it.", "Okay.", "Perfect.", "Lovely.", "Nice.", "Got it.", "Last one."];
      return { text: intros[step - 1] || (lang === 'hi' ? 'एक और छोटा सवाल —' : "One quick thing —"),
               components:[{ type:'quiz', question: s.q, options: s.opts, step: step+1, total: TOTAL, key: s.key }] };
    }

    // Quiz complete — show filtered frames based on saved answers
    if (step >= TOTAL) {
      const a = sd.quiz_answers || {};
      let pool = [...CLIENT_FRAMES];
      // Simple budget-aware filter from saved budget answer
      const b = (a.budget || '').toLowerCase();
      if (b.includes('1,000') || b.includes('under'))       pool = pool.filter(f => f.price <= 1000);
      else if (b.includes('2,000'))                         pool = pool.filter(f => f.price <= 2000);
      else if (b.includes('3,500'))                         pool = pool.filter(f => f.price <= 3500);
      else if (b.includes('premium'))                       pool = pool.filter(f => f.price >= 3000);
      if (!pool.length) pool = [...CLIENT_FRAMES];
      const doneText  = lang === 'hi'
        ? 'बस हो गया! आपके जवाबों के हिसाब से ये रहे बेस्ट फ्रेम:'
        : "All done! Based on your answers, here are your best-fit frames:";
      const doneTitle = lang === 'hi' ? 'आपके लिए चुने गए' : 'Curated just for you';
      return { text: doneText, components:[{ type:'carousel', title: doneTitle, frames: pool.slice(0,6) }] };
    }

    // Fallback
    const frames = clientSearchFrames(sd.face_data?.shape, 6);
    const fallbackText = lang === 'hi'
      ? 'मैं आपकी परफेक्ट फ्रेम ढूंढने में मदद कर सकती हूँ! एक selfie अपलोड करें या नीचे टॉप पिक्स देखें 👇'
      : "I'd love to help you find perfect frames! Try uploading a selfie for face shape analysis, or browse our top picks below 👇";
    return { text: fallbackText, components:[{ type:'carousel', title: lang === 'hi' ? 'आपके लिए टॉप पिक्स' : 'Top picks for you', frames }] };
  }, [lang]);

  // ── Post-results intent parser ──────────────────────────────────────
  // When the customer can see a product carousel OR a lens-rec card,
  // capture natural-language intents like "add the first", "सब जोड़ दो",
  // "checkout", etc. and act locally. The MOST RECENT applicable component
  // wins — so if the last bubble is a lens card, "add 2nd" selects the 2nd
  // LENS (not re-adding a product from an older carousel).
  const _handlePostResultsIntent = useCallback((text) => {
    const t = (text || '').toLowerCase().trim();
    if (!t) return false;

    // Scan backwards and take the FIRST rich component we find (lens_rec or
    // carousel) — that represents what the customer is currently looking at.
    let frames = null;      // product list (if most recent is a carousel)
    let lensPkgs = null;    // lens list    (if most recent is a lens_rec)
    for (let i = messages.length - 1; i >= 0; i--) {
      const m = messages[i];
      if (m.role !== 'assistant') continue;
      const lens = (m.components || []).find(c => c.type === 'lens_rec');
      const car  = (m.components || []).find(c => c.type === 'carousel');
      if (lens?.packages?.length) { lensPkgs = lens.packages; break; }
      if (car?.frames?.length)    { frames   = car.frames;    break; }
    }
    if (!frames && !lensPkgs) return false;

    // Helper: push a user-message bubble so the intent shows in the chat log
    const echoUser = () => setMessages((prev) => [...prev, {
      id: Date.now() + '-u', role: 'user', type: 'text',
      content: text, text: text, time: now(),
    }]);

    // ── Checkout / continue to Lenskart ────────────────────────────
    const CHECKOUT = ['checkout', 'check out', 'continue to lenskart', 'go to lenskart',
                      'buy now', 'proceed', 'place order',
                      'लेंसकार्ट', 'lenskart par', 'lenskart pe',
                      'खरीद', 'order कर', 'चेकआउट'];
    if (CHECKOUT.some(w => t.includes(w))) {
      echoUser();
      setMessages((prev) => [...prev, {
        id: Date.now() + '-a', role: 'assistant',
        text: lang === 'hi'
          ? '🛒 Lenskart.com पर ले जा रही हूँ — नया tab खुलेगा।'
          : '🛒 Taking you to Lenskart.com — opening in a new tab.',
        components: [], time: now(),
      }]);
      try { window.open('https://www.lenskart.com', '_blank', 'noopener'); } catch {}
      return true;
    }

    // ── Add ALL (products carousel only — not lenses) ─────────────
    const ADD_ALL = ['add all', 'सब जोड़', 'sabh add', 'sab add', 'सब कार्ट'];
    if (ADD_ALL.some(w => t.includes(w)) && frames) {
      echoUser();
      frames.forEach((f) => handleFrameSelect(f));
      return true;
    }

    // ── Lens card active: match by NAME or "skip lens" ──────────
    // When lenses are shown, most users answer naturally — "blue block pro
    // kar do", "clear vision wala", "no lens chahiye", "skip coating".
    // Treat the whole reply as a lens-intent so it doesn't leak through to
    // the filter-keyword matcher on the backend (which would see "blue" and
    // re-run a product search).
    if (lensPkgs) {
      // A) Skip / no lens → open cart with just the frame(s) already picked
      const SKIP = [
        'no lens', 'no coating', 'skip lens', 'skip coating', 'without lens',
        'bina lens', 'lens nahi', 'lens mat', 'koi lens nahi',
        'बिना लेंस', 'लेंस नहीं', 'लेंस मत',
        'checkout without lens', 'no need for lens',
      ];
      if (SKIP.some(w => t.includes(w))) {
        echoUser();
        setMessages((prev) => [...prev, {
          id: Date.now() + '-a', role: 'assistant',
          text: lang === 'hi'
            ? '👍 ठीक है, बिना lens के आगे बढ़ते हैं। Cart खोल रही हूँ।'
            : '👍 Got it — skipping the lens package. Opening your cart.',
          components: [], time: now(),
        }]);
        setShowCart(true);
        return true;
      }

      // B) Name match — pick the lens whose name best overlaps the reply.
      // Tokenise on both spaces AND camelCase boundaries, so "BluBlock Pro"
      // tokenises as ['blu','block','pro'] and matches "blue block pro".
      const norm = (s) => (s || '').toLowerCase().replace(/[^a-z0-9\s]+/g, ' ').replace(/\s+/g, ' ').trim();
      const tokensOf = (s) => (s || '')
        .replace(/([a-z])([A-Z])/g, '$1 $2')
        .toLowerCase()
        .replace(/[^a-z0-9\s]+/g, ' ')
        .split(/\s+/)
        .filter((x) => x.length >= 3);
      const tN   = norm(t);
      let nameIdx = -1;
      let bestHit = 0;
      lensPkgs.forEach((p, i) => {
        const tokens = tokensOf(p.name);
        const hits   = tokens.filter((tok) => tN.includes(tok)).length;
        if (hits > bestHit) { bestHit = hits; nameIdx = i; }
      });
      if (nameIdx >= 0 && bestHit >= 1) {
        echoUser();
        handleSelectLens(lensPkgs[nameIdx]);
        // After adding the lens, open cart so the customer sees the full
        // order (frame + lens) and the "Continue to Lenskart.com" CTA.
        setShowCart(true);
        return true;
      }
    }

    // ── Ordinal add (1st / 2nd / 3rd / first / last) ─────────────
    // ADD_VERBS also accepts Hindi/Hinglish transliterations of "add"/"cart":
    //   "एड", "ऐड"                    → add
    //   "कट", "काट", "ऑटो कट"          → cart ("auto-cut" = colloquial cart)
    //   "jod", "daal", "le le", "kar de", "kar do"
    // NB: \b doesn't work around Devanagari because JS `\w` is ASCII only —
    // so these matchers use plain `.includes` or substring-friendly regex.
    const hasAddVerb = (
      /(add|cart|जोड़|डाल|चुन|select)/i.test(t) ||
      /(^|\s)(एड|ऐड|कट|काट)(\s|$)/.test(t) ||
      /ऑटो\s*कट/.test(t) ||
      /\b(kar\s*(do|de)|le\s*lo|le\s*le|kat\s*(do|de))\b/.test(t)
    );
    if (!hasAddVerb) return false;

    const items = lensPkgs || frames || [];
    let idx = -1;

    // Single-item short-circuit — if there's only one product/lens being
    // shown and the user expresses ANY add-verb ("add to cart", "कट कर दो",
    // "ले लो", etc.), pick it without requiring an ordinal. This matches
    // customer expectations: nothing to pick between, so "add to cart" is
    // unambiguous.
    if (items.length === 1) idx = 0;

    // Devanagari ordinal matcher (plain includes — \b fails around Devanagari)
    const has = (needles) => needles.some((n) => t.indexOf(n) !== -1);

    if (/\b(1st|first|pehla|pahla|pehle|pahle|पहलवा)\b/.test(t)
        || /\b(this one|that one)\b/.test(t)
        || has(['पहला', 'पहले'])) idx = 0;
    else if (/\b(2nd|second|dusra|doosra|dusre|doosre|dusrey)\b/.test(t)
        || has(['दूसरा', 'दूसरे', 'सेकंड', 'सेकण्ड'])) idx = 1;
    else if (/\b(3rd|third|teesra|tisra|teesre|tisre)\b/.test(t)
        || has(['तीसरा', 'तीसरे', 'थर्ड'])) idx = 2;
    else if (/\b(4th|fourth|chautha|chauthe)\b/.test(t)
        || has(['चौथा', 'चौथे', 'फोर्थ'])) idx = 3;
    else if (/\b(5th|fifth|panchwa|panchwe)\b/.test(t)
        || has(['पाँचवा', 'पांचवा', 'पाँचवे', 'पांचवे', 'फिफ्थ'])) idx = 4;
    else if (/\b(6th|sixth|chhata|chhathe)\b/.test(t)
        || has(['छठा', 'छठे', 'सिक्स्थ'])) idx = 5;
    else if (/\blast\b|aakhiri|aakhri|akhri/.test(t)
        || has(['आख़िरी', 'आखिरी', 'लास्ट'])) idx = items.length - 1;
    else {
      const m = t.match(/\b(number|#|no\.?)\s*([1-9])\b/);
      if (m) idx = Math.min(9, parseInt(m[2], 10) - 1);
    }

    if (idx >= 0 && idx < items.length) {
      echoUser();
      // Route: if the latest rich component was a lens card, pick the LENS.
      if (lensPkgs) {
        handleSelectLens(items[idx]);
        // Finalise the journey — cart now has frame(s) + lens, show checkout.
        setShowCart(true);
      } else {
        handleFrameSelect(items[idx]);
      }
      return true;
    }
    return false;
  }, [messages, lang]);

  // ── Core: send message (tries backend, falls back to client demo) ──
  const sendMessage = useCallback(async (text, type = 'text', imageData = null, langOverride = null, pitchHint = null) => {
    // Any customer turn interrupts Claire so the conversation stays snappy
    stopSpeaking();
    const activeLang = langOverride || lang;

    // ── Post-results intent shortcuts ────────────────────────────
    // After a carousel has been shown, the customer can naturally say:
    //   "add the first one", "dusra add kr do", "पहला वाला जोड़ दो",
    //   "add all", "checkout", "continue to lenskart", "सब जोड़ दो"
    // Detect these here and act locally, without a backend round-trip.
    if (type === 'text' && !imageData) {
      const handled = _handlePostResultsIntent(text);
      if (handled) return;
    }

    // If the mic captured pitch while the user answered, attach it so the
    // backend can bias gender_pref (especially for "मेरे लिए" / "for me").
    let gender_voice = null;
    if (pitchHint?.gender) {
      gender_voice = pitchHint.gender;
      console.log('[voice-gender]', pitchHint);
    }
    // ── Detect pending quiz so free text / button clicks both record the answer ──
    let pendingQuizAnswer = null; // { key, step, total }
    let pendingQuizData   = null; // the full quiz component (needed for mini-flow routing)
    if ((type === 'text' || type === 'quiz_answer') && !imageData) {
      for (let i = messages.length - 1; i >= 0; i--) {
        const m = messages[i];
        if (m.role !== 'assistant' || m.answered) continue;
        const quiz = (m.components || []).find(c => c.type === 'quiz');
        if (quiz) {
          pendingQuizAnswer = { key: quiz.key, step: quiz.step, total: quiz.total, msgIdx: i };
          pendingQuizData   = quiz;
          setMessages((prev) => prev.map((x, idx) => idx === i ? { ...x, answered: true } : x));
          type = 'quiz_answer';
          break;
        }
      }
    }

    // Mini-flow (total === 4 after face analysis, or 3 legacy): route the answer
    // back through handleQuizAnswer which keeps the flow client-side and never
    // lets the backend intercept a phrase like "contact lenses" as a lens inquiry.
    if (pendingQuizAnswer && pendingQuizData && (pendingQuizData.total === 4 || pendingQuizData.total === 3)) {
      // Log the user's answer bubble first (the normal sendMessage path would have done this)
      setMessages((prev) => [...prev, {
        id: Date.now() + '-u', role: 'user',
        type: 'quiz_answer', content: text, text: text, time: now()
      }]);
      _handleQuizAnswerRef.current?.(text, pendingQuizAnswer.key, pendingQuizAnswer.step, null, pendingQuizData);
      return;
    }

    const userMsg = {
      id: Date.now() + '-u', role: 'user',
      type: imageData ? 'image' : type,
      content: imageData || text,
      text: text,
      time: now()
    };

    if (type !== 'greet') {
      setMessages((prev) => [...prev, userMsg]);
    }
    setLoading(true);

    const apiMessages = type === 'greet' ? [] :
      [...messages, userMsg].map((m) => ({
        role: m.role, type: m.type || 'text',
        content: m.content || m.text || '',
        text: m.text || m.content || '',
      }));

    // Advance quiz step in local session + record answer
    const newSd = {
      ...sessionData,
      quiz_answers: { ...(sessionData.quiz_answers || {}) }
    };
    if (pendingQuizAnswer) {
      newSd.quiz_answers[pendingQuizAnswer.key] = text;
      newSd.quiz_step = Math.max(sessionData.quiz_step || 0, pendingQuizAnswer.step);
      // Attach voice-derived gender hint when the gender question was answered
      if (pendingQuizAnswer.key === 'gender' && gender_voice) {
        newSd.quiz_answers.gender_voice = gender_voice;
      }
    } else if (type === 'quiz_answer' || (sessionData.quiz_step > 0 && sessionData.quiz_step < 8)) {
      newSd.quiz_step = (sessionData.quiz_step || 0) + 1;
    }
    // Persist updated session immediately so later calls see the new answers
    setSessionData(newSd);

    let handled = false;
    try {
      const controller = new AbortController();
      // Quiz completion triggers LLM re-rank (Gemini Pro) which can take 3-6s.
      // 15s is comfortably above that; client demo still kicks in if backend is truly down.
      const timer = setTimeout(() => controller.abort(), 15000);
      const res = await fetch(`${API}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: apiMessages, session_data: { ...newSd, lang: activeLang } }),
        signal: controller.signal
      });
      clearTimeout(timer);
      const data = await res.json();
      if (data.success && data.message) {
        setMessages((prev) => [...prev, {
          id: Date.now() + '-a', role: 'assistant',
          text: data.message.text || '', components: data.message.components || [],
          time: now()
        }]);
        if (data.session_data) {
          setSessionData((prev) => ({ ...prev, ...data.session_data }));
          if (data.session_data.face_data) setFaceData(data.session_data.face_data);
        } else {
          setSessionData(newSd);
        }
        handled = true;
      }
    } catch (err) {
      // Backend unavailable — fall through to client-side demo below
    }

    // ── Filter-query shortcut: try /api/search before demo reply ────
    if (!handled && type !== 'greet' && type !== 'quiz_answer') {
      // Build cumulative tags: quiz answers + previously accumulated + new text
      const quizBlob = Object.values(newSd.quiz_answers || {}).join(' ');
      const quizTags = quizBlob ? extractTagsFromText(quizBlob) : {};
      const newTags  = extractTagsFromText(text);
      const accumulated = { ...(sessionData.active_filters || {}) };
      for (const [k, v] of Object.entries(quizTags)) { if (v != null && !accumulated[k]) accumulated[k] = v; }
      for (const [k, v] of Object.entries(newTags))  { if (v != null) accumulated[k] = v; }
      const hasTag = Object.values(accumulated).some(v => v != null);
      if (hasTag) {
        setSessionData(prev => ({ ...prev, active_filters: accumulated }));
        try {
          const body = { quiz_tags: accumulated };
          if (accumulated.product_type) body.filters = { type: accumulated.product_type };
          const ctrl = new AbortController();
          setTimeout(() => ctrl.abort(), 3000);
          const sRes  = await fetch(`${API}/api/search`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
            signal: ctrl.signal,
          });
          const sData = await sRes.json();
          if (sData.success) {
            handled = true;
            if (sData.no_match) {
              setMessages((prev) => [...prev, {
                id: Date.now() + '-a', role: 'assistant',
                text: `🔍 ${sData.reason || 'No products found for those filters.'} Try adjusting your search!`,
                components: [], time: now()
              }]);
            } else {
              const products = (sData.products || sData.frames || []).map(enrichProduct);
              const total    = sData.total_found || products.length;
              const hintOrder = ['budget','product_type','color_type','color','trend','lifestyle','vision_need','age_group','gender_pref','frame_shape_pref'];
              const filterHints = hintOrder
                .map(k => accumulated[k] ? accumulated[k].toString().replace(/_/g,' ') : null)
                .filter(Boolean);
              const desc = filterHints.length ? filterHints.join(' + ') : 'your criteria';
              setMessages((prev) => [...prev, {
                id: Date.now() + '-a', role: 'assistant',
                text: `🎯 Filters: **${desc}** — ${total} products found:`,
                components: [{ type: 'carousel', title: 'Search Results', frames: products }],
                time: now()
              }]);
            }
          }
        } catch { /* ignore — fall through to demo reply */ }
      }
    }

    // ── Client-side fallback (no backend needed) ──────────
    if (!handled) {
      setSessionData(newSd);
      const reply = clientDemoReply(text, type, newSd);
      setMessages((prev) => [...prev, {
        id: Date.now() + '-a', role: 'assistant',
        text: reply.text, components: reply.components || [],
        time: now()
      }]);
    }

    setLoading(false); // ← always runs, no matter what
  }, [messages, sessionData, clientDemoReply, lang]);

  // ── Quiz answer handler ──────────────────────────────
  // analysisResult is the optional Bedrock tag extraction payload
  // ── Mini-quiz (post-face-analysis) — 3 steps, stays frontend-side ──
  // This is used by Upload Selfie and Live Recommendation flows. Questions
  // are product_type → style → vision. Total = 3. After Q3, call /api/search.
  const _miniQ = (key, lang) => {
    const pick = (en, hi) => lang === 'hi' ? hi : en;
    if (key === 'style_pref') {
      return {
        question: pick('Which style feels most like you — classic and timeless, bold and trendy, minimal and clean, or adventurous?',
                       'कौन सा स्टाइल अच्छा लगता है — क्लासिक, बोल्ड, मिनिमल, या एडवेंचरस?'),
        options:  pick(['Classic & Timeless','Bold & Trendy','Minimal & Clean','Adventurous'],
                       ['क्लासिक टाइमलेस','बोल्ड ट्रेंडी','मिनिमल क्लीन','एडवेंचरस']),
      };
    }
    if (key === 'prescription') {
      return {
        question: pick('And the vision bit — do you have trouble seeing up close, or far away? Maybe it is for computer work, or just zero power for fashion?',
                       'और नज़र — पास का नहीं दिखता, दूर का नहीं दिखता, कंप्यूटर के लिए, या सिर्फ फैशन के लिए बिना पावर के?'),
        options:  pick(['Zero power (fashion only)','Single vision','Progressive / Bifocal','Computer / reading glasses'],
                       ['ज़ीरो पावर (फैशन)','सिंगल विज़न','प्रोग्रेसिव / बाइफोकल','कंप्यूटर / पढ़ने के लिए']),
      };
    }
    if (key === 'budget') {
      return {
        question: pick('Last one — budget-wise, what suits you? Under 1000, 1000 to 2000, 2000 to 3500, or premium above 3500?',
                       'आख़िरी सवाल — बजट कितना है? हज़ार से कम, एक से दो हज़ार, दो से साढ़े तीन हज़ार, या प्रीमियम साढ़े तीन हज़ार से ज़्यादा?'),
        options:  pick(['Under ₹1,000','₹1,000 – ₹2,000','₹2,000 – ₹3,500','Premium ₹3,500+'],
                       ['₹1,000 से कम','₹1,000 – ₹2,000','₹2,000 – ₹3,500','प्रीमियम ₹3,500+']),
      };
    }
    return null;
  };

  const _miniSearchAndRender = useCallback(async (accumulatedAnswers) => {
    setLoading(true);
    // Build quiz_tags from face analysis + mini answers
    const fd = sessionData.face_data || faceData || {};
    const tags = {
      ...(sessionData.active_filters || {}),
      ...(fd.gender    && { gender_pref: fd.gender }),
      ...(fd.age_group && { age_group:   fd.age_group }),
    };
    // Map mini-quiz answers into canonical tags via the heuristic
    const blob = Object.values(accumulatedAnswers).join(' ');
    const extracted = extractTagsFromText(blob);
    for (const [k, v] of Object.entries(extracted)) { if (v != null) tags[k] = v; }

    let products = [];
    try {
      const resp = await fetch(`${API}/api/search`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          quiz_tags: tags,
          face_shape: fd.shape,
        }),
        signal: AbortSignal.timeout(12000),
      });
      const data = await resp.json();
      if (data.success && !data.no_match) {
        products = (data.products || data.frames || []).map(enrichProduct);
      }
    } catch (_) { /* fall back to local */ }
    if (!products.length) {
      products = clientSearchFrames(fd.shape, 6);
    }
    const msg = lang === 'hi'
      ? `बहुत बढ़िया! आपके लिए ${products.length} बेस्ट फ्रेम तैयार हैं।`
      : `Great — I've picked ${products.length} frames that'll suit you.`;
    const title = lang === 'hi' ? 'आपके लिए चुने गए' : 'Curated for you';
    setMessages((prev) => prev.concat({
      id: Date.now() + '-a', role: 'assistant',
      text: msg,
      components: [{ type: 'carousel', title, frames: products }],
      time: now(),
    }));
    setSessionData((prev) => ({ ...prev, active_filters: tags }));
    setLoading(false);
  }, [sessionData, faceData, lang]);

  const handleQuizAnswer = useCallback((answer, key, step, analysisResult, quizData) => {
    const isMini = quizData && (quizData.total === 4 || quizData.total === 3);
    const newAnswers = { ...sessionData.quiz_answers, [key]: answer };
    const newStep    = Math.max(sessionData.quiz_step || 0, step);

    if (analysisResult?.tags) {
      const t = analysisResult.tags;
      if (t.lifestyle   && !newAnswers.lifestyle)   newAnswers.lifestyle   = t.lifestyle;
      if (t.trend       && !newAnswers.style_pref)  newAnswers.style_pref  = t.trend;
      if (t.color       && !newAnswers.color_pref)  newAnswers.color_pref  = t.color;
      if (t.budget      && !newAnswers.budget)      newAnswers.budget      = t.budget;
      if (t.vision_need && !newAnswers.prescription) newAnswers.prescription = t.vision_need;
    }

    // Mark the message as answered
    setMessages((prev) => prev.map((m) => {
      if (m.components?.some((c) => c.type === 'quiz' && c.step === step)) {
        return { ...m, answered: true };
      }
      return m;
    }));

    if (isMini) {
      // ── Mini flow: 4 steps → product_type → style → vision → budget ──
      const MINI_TOTAL = 4;
      const nextStep = step + 1;
      setSessionData((prev) => ({ ...prev, quiz_answers: newAnswers }));
      if (nextStep > MINI_TOTAL) {
        _miniSearchAndRender(newAnswers);
        return;
      }
      const nextKey = nextStep === 2 ? 'style_pref'
                    : nextStep === 3 ? 'prescription'
                    : 'budget';
      const mq = _miniQ(nextKey, lang);
      if (!mq) return;
      const ack = lang === 'hi' ? 'समझ गई।' : 'Got it.';
      setMessages((prev) => prev.concat({
        id: Date.now() + '-a', role: 'assistant',
        text: ack,
        components: [{ type: 'quiz', question: mq.question, options: mq.options,
                       step: nextStep, total: MINI_TOTAL, key: nextKey }],
        time: now(),
      }));
      return;
    }

    // Normal flow — delegate to the main backend quiz
    setSessionData((prev) => ({ ...prev, quiz_step: newStep, quiz_answers: newAnswers }));
    sendMessage(answer, 'quiz_answer');
  }, [sessionData, sendMessage, _miniSearchAndRender, lang]);

  // Keep the ref fresh so sendMessage (defined earlier) can call it.
  useEffect(() => { _handleQuizAnswerRef.current = handleQuizAnswer; }, [handleQuizAnswer]);

  // ── Lens catalog used for post-cart recommendations ─────
  // Mirrors backend MOCK_LENSES so client-side is self-contained.
  const LENS_CATALOG = useMemo(() => ([
    { id:'LENS-BLU',  name:'BluBlock Pro',        tagline:'Shield Your Eyes from Digital Strain',
      price:699,  original_price:1299, badge:'Most Popular', thickness:'Standard 1.56', coating:'BluBlock + AR',

    { id:'LENS-SV',   name:'ClearVision Single',  tagline:'Crystal-Clear Single Vision',

      description:'Premium 1.56 index single vision lenses with industry-leading anti-reflective coating. Best for mild-to-moderate prescriptions.',
      features:['Anti-reflective','UV protection','Scratch resistant','Lightweight'],
      best_for:['single_vision','mild_prescription'] },
    { id:'LENS-THIN', name:'HiIndex Thin',        tagline:'Power Without the Bulk',
      price:1299, original_price:2499, badge:'Best for High Power', thickness:'Thin 1.67', coating:'Premium AR',

      features:['Ultra-thin 1.67 index','Anti-reflective','UV 400','Impact resistant'],

    { id:'LENS-PROG', name:'Progressive Elite',   tagline:'See All Distances, Seamlessly',
      price:2499, original_price:4999, badge:'Premium', thickness:'1.60 Index', coating:'Elite AR',
      description:'Premium progressive multifocal lenses with wide corridors for effortless switching between near, mid and far vision.',
      features:['Wide corridors','No-line bifocal','Anti-reflective','UV 400'],
      best_for:['progressive','bifocal','age_40_plus'] },
    { id:'LENS-PHOTO',name:'Transitions Smart',   tagline:'Adapt to Every Light',
      price:1799, original_price:3299, badge:'Smart Tech', thickness:'1.56 Standard', coating:'Photochromic',
      description:'Photochromic lenses auto-darken in sunlight and clear indoors. One pair for both driving, reading and the outdoors.',
      features:['Auto-tint','UV 400 protection','Anti-reflective','Scratch resistant'],

    { id:'LENS-ZERO', name:'StyleZero Non-Rx',    tagline:'Fashion-Forward Zero Power',
      price:299,  original_price:599,  badge:'Fashion', thickness:'Standard', coating:'Anti-Reflective',
      description:'Premium zero-power lenses with anti-reflective coating. Pure style for fashion frames without any prescription.',
      features:['Zero power','Anti-glare','UV protection','Crystal clear'],
      best_for:['zero_power','fashion'] },
  ]), []);

  // Pick the 3 most relevant lens packages for a given frame + user context
  const pickLensesFor = useCallback((frame) => {
    const tags       = sessionData.active_filters || {};
    const vision     = tags.vision_need || '';
    const type       = (frame.type || tags.product_type || 'eyeglasses').toLowerCase();
    const face       = sessionData.face_data || faceData || {};
    const picked = [];
    const push = (id) => { if (!picked.find(p => p.id === id)) {
      const p = LENS_CATALOG.find(l => l.id === id); if (p) picked.push(p);
    }};

    // Contact lenses are themselves the lens — no lens package to add.
    if (type === 'contact_lens') return [];
    // Sunglasses: fashion-forward → zero-power + photochromic + single-vision for Rx
    if (type === 'sunglasses') {
      if (vision === 'zero_power') { push('LENS-ZERO'); push('LENS-PHOTO'); push('LENS-BLU'); }
      else                          { push('LENS-PHOTO'); push('LENS-SV'); push('LENS-THIN'); }
      return picked.slice(0, 3);
    }
    // Eyeglasses based on vision_need
    if (vision === 'progressive')    { push('LENS-PROG');  push('LENS-BLU');  push('LENS-SV'); }
    else if (vision === 'zero_power'){ push('LENS-ZERO'); push('LENS-BLU');  push('LENS-PHOTO'); }
    else                              { push('LENS-SV');   push('LENS-BLU');  push('LENS-THIN'); }

    // Nudge for older users → include Progressive
    if (face.age_group === 'aged' && !picked.find(p => p.id === 'LENS-PROG')) {
      picked[picked.length - 1] = LENS_CATALOG.find(l => l.id === 'LENS-PROG');
    }
    return picked.slice(0, 3);
  }, [sessionData, faceData, LENS_CATALOG]);

  // ── Frame add to cart ────────────────────────────────
  const handleFrameSelect = useCallback((frame) => {
    setCart((prev) => {
      if (prev.some((f) => f.id === frame.id)) return prev;
      return [...prev, frame];
    });
    // 1) confirmation bubble
    const confirmMsg = lang === 'hi'
      ? `🛒 **${frame.name}** कार्ट में जोड़ दिया गया! बढ़िया चुनाव।`
      : `🛒 **${frame.name}** added to cart. Great choice!`;

    // 2) lens guidance — only for frames that TAKE lenses. Contact lenses are
    //    themselves the lens, so skip this bubble entirely.
    const packages = pickLensesFor(frame);
    const isContact = (frame.type || '').toLowerCase() === 'contact_lens';

    if (!packages.length || isContact) {
      setMessages((prev) => [...prev, {
        id: Date.now() + '-c', role: 'assistant',
        text: confirmMsg, components: [], time: now()
      }]);
      return;
    }

    const reasoning = (() => {
      const vision = sessionData.active_filters?.vision_need;
      const r = [];
      if (vision === 'progressive') r.push(lang === 'hi'
        ? 'Progressive Elite आपकी पास और दूर दोनों की नज़र के लिए बेस्ट है।'
        : 'Progressive Elite covers near, mid and far vision in one lens.');
      else if (vision === 'zero_power') r.push(lang === 'hi'
        ? 'StyleZero आपकी fashion-only ज़रूरत के लिए perfect है।'
        : 'StyleZero suits your fashion-only need without any prescription.');
      else r.push(lang === 'hi'
        ? 'ClearVision Single आपकी single vision के लिए best value है।'
        : 'ClearVision Single is the best value for single-vision prescriptions.');
      r.push(lang === 'hi'
        ? 'BluBlock रोज़ 4+ घंटे screen use करने वालों के लिए ज़रूरी है।'
        : 'BluBlock is a must if you spend 4+ hours on screens daily.');
      return r;
    })();

    const n = packages.length;  // match the actual count so wording stays truthful
    const lensText = lang === 'hi'
      ? `अब lens चुनिए — आपके प्रेस्क्रिप्शन और lifestyle के हिसाब से ये ${n} options बेस्ट हैं:`
      : `Now let's pick the lenses — based on your prescription and lifestyle, here are the top ${n} for this frame:`;

    setMessages((prev) => [...prev, {
      id: Date.now() + '-c', role: 'assistant',
      text: confirmMsg, components: [], time: now()
    }, {
      id: Date.now() + '-l', role: 'assistant',
      text: lensText,
      components: [{ type:'lens_rec', packages, reasoning }],
      time: now()
    }]);
  }, [lang, pickLensesFor, sessionData]);

  // ── Lens package selection (from LensRecommendation card) ──────────
  // Adds the chosen lens to the cart as a line item and confirms in chat.
  const handleSelectLens = useCallback((pkg) => {
    setCart((prev) => {
      // Treat the lens like a cart item — dedupe by id
      if (prev.some((x) => x.id === pkg.id)) return prev;
      return [...prev, {
        id: pkg.id, name: pkg.name,
        brand: 'Lenskart Lenses',
        price: pkg.price, original_price: pkg.original_price,
        style: 'lens', frame_shape: 'lens', color: 'clear',
        type: 'lens_package', tags: ['lens', pkg.id.toLowerCase()],
        _lens: true,
      }];
    });
    const msg = lang === 'hi'
      ? `✨ **${pkg.name}** lens जोड़ दी — कुल ₹${pkg.price} अतिरिक्त।`
      : `✨ **${pkg.name}** lens added — +₹${pkg.price}.`;
    setMessages((prev) => [...prev, {
      id: Date.now() + '-la', role: 'assistant',
      text: msg, components: [], time: now(),
    }]);
  }, [lang]);

  // ── On-demand photo for fit score (keeps session intact) ─────────────
  // Called from <FitUploadPrompt /> after the user picks an image. We
  // silently store it into sessionData.face_data so subsequent fit scores
  // work without re-asking. No mini-quiz is triggered.
  const handleFitPhotoUploaded = useCallback(async (dataUri, frame) => {
    // Upload to backend (just to get a /uploads/ URL the API can read)
    setLoading(true);
    let face = null;
    try {
      const resp = await fetch(`${API}/api/face-analyze`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: dataUri }),
        signal: AbortSignal.timeout(20000),
      });
      const data = await resp.json();
      if (data.has_face === false) {
        setMessages((prev) => [...prev, {
          id: Date.now() + '-a', role: 'assistant',
          text: lang === 'hi'
            ? '😕 फ़ोटो में चेहरा नहीं दिखा। कोई दूसरी photo try करें।'
            : "😕 I couldn't spot a face in that photo. Try another one?",
          components: [], time: now(),
        }]);
        setLoading(false);
        return;
      }
      if (data.success) face = data;
    } catch (_) { /* network issue — still try local fit */ }

    if (face) {
      setFaceData(face);
      // Also mark last_shown so the backend doesn't re-issue the face_analysis
      // card the next time the user says anything (e.g. "kisi aur ke liye").
      setSessionData((prev) => ({ ...prev, face_data: face, last_shown: 'face_analysis' }));
    }
    setLoading(false);
    // Defer the fit-score call so React can flush the new face_data first.
    setTimeout(() => handleFitScoreRef.current?.(frame), 50);
  }, [lang]);

  // Ref to avoid stale closure on handleFitScore (defined just below)
  const handleFitScoreRef = useRef(null);

  // ── Fit score request (LLM-backed size-confidence widget) ───────────
  // If we already have the customer's face photo in session, post it plus
  // the frame details to /api/fit-score so Gemini can judge the specific
  // pairing. Otherwise ask for a photo — but DO NOT start the full selfie
  // mini-quiz flow, and preserve the ongoing session.
  const handleFitScore = useCallback(async (frame) => {
    const fd = sessionData.face_data || faceData || {};
    const imageUrl = fd.url || null;

    // No image → one-off photo prompt that runs fit score only
    if (!imageUrl) {
      setMessages((prev) => [...prev, {
        id: Date.now() + '-fs-ask', role: 'assistant',
        text: lang === 'hi'
          ? `आपके चेहरे के साथ ${frame.name} कैसा लगेगा, ये बताने के लिए एक फ़ोटो चाहिए।`
          : `To show exactly how ${frame.name} will look and fit on you, I need a quick photo.`,
        components: [{ type: 'fit_upload', frame }],
        time: now(),
      }]);
      return;
    }

    // Show spinner bubble while Gemini analyses
    const loadingId = Date.now() + '-fs-load';
    setMessages((prev) => [...prev, {
      id: loadingId, role: 'assistant',
      text: lang === 'hi'
        ? `🔍 ${frame.name} का फिट check कर रही हूँ…`
        : `🔍 Checking how ${frame.name} fits you…`,
      components: [], time: now(), _loading: true
    }]);

    let result = null;
    try {
      const resp = await fetch(`${API}/api/fit-score`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image_url: imageUrl, frame }),
        signal: AbortSignal.timeout(20000),
      });
      result = await resp.json();
    } catch (_) { /* fall through to client fallback */ }

    setMessages((prev) => prev.filter(m => m.id !== loadingId));

    if (!result || !result.success || result.has_face === false) {
      // Fallback: deterministic client-side score so the widget never blanks
      const faceShape = (fd.shape || 'Oval').toLowerCase();
      const suits = (frame.shape_suitability || frame.face_shape_recommendation || []).map(s => String(s).toLowerCase());
      const idHash = (() => { let h = 0; for (const c of String(frame.id||'')) h = ((h<<5)-h+c.charCodeAt(0))|0; return Math.abs(h); })();
      const score   = suits.includes(faceShape) ? 88 + (idHash % 10) : 62 + (idHash % 12);
      const verdict = score >= 90 ? 'Perfect Match' : score >= 75 ? 'Great Fit' : 'Good Fit';
      result = {
        score, verdict, size_match: 'just right',
        reasons: [
          `${frame.style || 'This frame'} ${suits.includes(faceShape) ? 'complements' : 'pairs with'} your ${fd.shape || 'face'} shape.`,
          `Frame width is proportionally ${score >= 80 ? 'ideal' : 'acceptable'} for your face.`,
        ],
      };
    }

    const verdictHi = { 'Perfect Match':'परफेक्ट मैच', 'Great Fit':'बहुत अच्छा फिट',
                        'Good Fit':'अच्छा फिट', 'Okay Fit':'ठीक-ठाक फिट',
                        'Not Ideal':'अच्छा नहीं' };
    const sizeHi    = { 'too small':'थोड़ा छोटा', 'just right':'परफेक्ट साइज़', 'too large':'थोड़ा बड़ा' };

    const introText = lang === 'hi'
      ? `${frame.name} का आपके चेहरे पर fit score:`
      : `Here's the fit analysis for ${frame.name}:`;
    setMessages((prev) => [...prev, {
      id: Date.now() + '-fs', role: 'assistant',
      text: introText,
      components: [{
        type: 'fit_score',
        frame_id:   frame.id, frame_name: frame.name,
        score:      result.score,
        verdict:    lang === 'hi' ? (verdictHi[result.verdict] || result.verdict) : result.verdict,
        size_match: lang === 'hi' ? (sizeHi[result.size_match] || result.size_match) : result.size_match,
        reasons:    result.reasons || [],
        image_url:  imageUrl,
      }],
      time: now(),
    }]);
  }, [sessionData, faceData, lang]);

  // Keep ref fresh so handleFitPhotoUploaded can trigger the latest
  // handleFitScore after setSessionData flushes.
  useEffect(() => { handleFitScoreRef.current = handleFitScore; }, [handleFitScore]);

  // ── Photo upload handler — works fully client-side ───
  // Send the photo to backend for LLM vision analysis, then kick off the
  // 3-question mini-quiz. Used by both Upload Selfie and Live Recommendation.
  const handlePhotoUpload = useCallback(async (imageDataUri) => {
    const photoMsg = {
      id: Date.now() + '-u', role: 'user',
      type: 'image', content: imageDataUri, text: 'Uploaded photo',
      time: now()
    };
    const loadingMsg = {
      id: Date.now() + '-load', role: 'assistant',
      text: lang === 'hi'
        ? '📸 फ़ोटो को AI से पढ़ रही हूँ… एक सेकंड।'
        : '📸 Reading your photo with AI… one moment.',
      components: [], time: now(), _loading: true
    };
    setMessages((prev) => [...prev, photoMsg, loadingMsg]);
    setLoading(true);

    let fd = null;
    try {
      const ctrl = new AbortController();
      setTimeout(() => ctrl.abort(), 20000);
      const resp = await fetch(`${API}/api/face-analyze`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image: imageDataUri }),
        signal: ctrl.signal,
      });
      const data = await resp.json();
      if (data.has_face === false) {
        setMessages((prev) => prev.filter((m) => !m._loading).concat({
          id: Date.now() + '-a', role: 'assistant',
          text: lang === 'hi'
            ? '😕 फ़ोटो में चेहरा नहीं दिखा। कृपया दोबारा कोशिश करें।'
            : "😕 I couldn't spot a face in that photo. Could you try another one?",
          components: [], time: now()
        }));
        setLoading(false);
        return;
      }
      if (!data.success) throw new Error(data.error || 'analysis failed');
      fd = data;
    } catch (err) {
      // Fall back to deterministic local analysis so the demo still runs
      fd = clientAnalyzeFace(imageDataUri);
    }

    setFaceData(fd);
    setSessionData((prev) => ({
      ...prev,
      face_data:     fd,
      last_shown:    'face_analysis',
      // Seed quiz_answers from vision so later recommendations already know
      // the user's gender / age / shape.
      quiz_answers: {
        ...(prev.quiz_answers || {}),
        ...(fd.gender && { gender: fd.gender === 'male' ? 'For him' : fd.gender === 'female' ? 'For her' : 'For everyone' }),
        ...(fd.age && { age: String(fd.age) }),
      },
      active_filters: {
        ...(prev.active_filters || {}),
        ...(fd.gender    && { gender_pref: fd.gender }),
        ...(fd.age_group && { age_group:   fd.age_group }),
      },
    }));

    // Speakable face-analysis announcement (skipped if shape is missing)
    const faceShape  = fd.shape || 'balanced';
    const confText   = fd.confidence ? ` (${Math.round(fd.confidence)}% confidence)` : '';
    const analysisText = lang === 'hi'
      ? `बहुत अच्छे! आपके चेहरे का shape ${faceShape} है${confText}। इन फ्रेम स्टाइल्स को आपके फ़ीचर्स बहुत अच्छे से सूट करेंगे।`
      : `Nice! I can see you have a ${faceShape} face shape${confText}. These frame styles really suit your features.`;

    // Mini-quiz Q1: product type (eyeglasses / sunglasses / contacts)
    const miniQ1 = lang === 'hi'
      ? { question: 'अब बताइए — आपको eyeglasses चाहिए, sunglasses, या contact lenses?',
          options:  ['चश्मा (Eyeglasses)','सनग्लास (Sunglasses)','कॉन्टैक्ट लेंस (Contact lenses)'] }
      : { question: 'Now tell me — are we looking at eyeglasses, sunglasses, or contact lenses?',
          options:  ['Eyeglasses','Sunglasses','Contact lenses'] };

    // Two separate assistant messages so TTS speaks the face analysis first,
    // pauses, then speaks the next question. Auto-mic only opens after the
    // quiz message (which is the one with the pending quiz component).
    const analysisMsg = {
      id: Date.now() + '-fa', role: 'assistant',
      text: analysisText,
      components: [{ type: 'face_analysis', ...fd }],
      time: now(),
    };
    const quizMsg = {
      id: Date.now() + '-q1', role: 'assistant',
      text: '',   // empty so TTS only speaks the question itself
      components: [{ type: 'quiz', ...miniQ1, step: 1, total: 4, key: 'product_type' }],
      time: now(),
    };
    setMessages((prev) => prev.filter((m) => !m._loading).concat([analysisMsg, quizMsg]));
    setLoading(false);
  }, [lang]);

  // ── New chat: fully reset session and reopen the language picker ─────
  const newChat = () => {
    stopSpeaking();
    setMessages([]);
    setFaceData(null);
    setCart([]);
    setSessionData({ quiz_step: 0, quiz_answers: {}, face_data: null, last_shown: null });
    _spokenRef.current = new Set();
    setLang(null);
    try {
      sessionStorage.removeItem('claire_lang');
      sessionStorage.removeItem('claire_mode');
    } catch {}
  };

  // ── Render ───────────────────────────────────────────
  return (
    <div className="flex h-full" style={{ background: '#070E1C' }}>

      {/* Sidebar */}
      <Sidebar faceData={faceData} cartCount={cart.length}
               onCart={() => setShowCart(true)}
               onNewChat={newChat}
               onUpload={() => setShowUpload(true)}
               onLive={() => setShowLive(true)} />

      {/* Main chat area */}
      <div className="flex-1 flex flex-col min-w-0">

        {/* Top bar */}
        <div className="flex items-center justify-between px-4 py-3"
             style={{ borderBottom: '1px solid rgba(0,195,195,.1)', background: '#070E1C' }}>
          {/* Mobile logo */}
          <div className="flex items-center gap-2 md:hidden">
            <div className="w-7 h-7 rounded-lg flex items-center justify-center"
                 style={{ background: 'linear-gradient(135deg, #00C3C3, #7C3AED)' }}>👓</div>
            <span className="font-bold text-sm gradient-text">Claire AI</span>
          </div>

          <div className="hidden md:flex items-center gap-2">
            <div className="w-2 h-2 rounded-full bg-lk-teal" style={{ boxShadow: '0 0 6px #00C3C3' }} />
            <span className="text-sm font-semibold text-white">Claire</span>
            <span className="text-xs text-slate-500">— AI Eyewear Stylist</span>
          </div>

          <div className="flex items-center gap-2">
            {faceData && (
              <div className="hidden sm:flex items-center gap-1.5 px-2.5 py-1.5 rounded-full text-xs"
                   style={{ background: 'rgba(0,195,195,.1)', color: '#00C3C3', border: '1px solid rgba(0,195,195,.2)' }}>
                {FACE_EMOJI[faceData.shape]} {faceData.shape} face
              </div>
            )}
            <button onClick={() => setShowUpload(true)}
                    className="px-3 py-1.5 rounded-full text-xs btn-ghost">
              📸 Upload
            </button>
            <button onClick={() => setShowCart(true)}
                    className="relative px-3 py-1.5 rounded-full text-xs btn-ghost">
              🛒
              {cart.length > 0 && (
                <span className="absolute -top-1 -right-1 w-4 h-4 rounded-full text-xs font-bold flex items-center justify-center"
                      style={{ background: '#FF6B35', color: '#fff', fontSize: 10 }}>
                  {cart.length}
                </span>
              )}
            </button>
          </div>
        </div>

        {/* Messages */}
        {/* Language selector overlay */}
        {!lang && <LanguageSelector onPick={pickLanguage} />}

        {lang && mode === 'voice' ? (
          <VoiceOnlyView
            lang={lang}
            onExit={() => { setMode('hybrid'); try { sessionStorage.setItem('claire_mode', 'hybrid'); } catch {} }}
            onSend={sendMessage}
            registerAutoMic={(fn) => { _autoMicRef.current = fn; }}
            lastAssistant={[...messages].reverse().find(m => m.role === 'assistant')}
            onFrameSelect={handleFrameSelect}
            onFitScore={handleFitScore}
            onFitPhotoUploaded={handleFitPhotoUploaded}
            onSelectLens={handleSelectLens}
          />
        ) : (
          <div className="flex-1 overflow-y-auto px-4 py-4 space-y-4 chat-gradient">
            {messages.length === 0 && !loading && lang && (
              <div className="flex flex-col items-center justify-center h-full text-center py-10">
                <div className="text-5xl mb-4">👓</div>
                <h2 className="text-xl font-bold gradient-text mb-2">Welcome to Lenskart Claire</h2>
                <p className="text-slate-400 text-sm max-w-xs">Your AI eyewear stylist is warming up...</p>
              </div>
            )}

            {messages.map((msg) => (
              <MessageBubble key={msg.id} msg={msg}
                             onAnswer={handleQuizAnswer}
                             onFrameSelect={handleFrameSelect}
                             onFitScore={handleFitScore}
                             onFitPhotoUploaded={handleFitPhotoUploaded}
                             onSelectLens={handleSelectLens}
                             lang={lang} />
            ))}

            {loading && <TypingIndicator />}
            <div ref={messagesEndRef} />
          </div>
        )}

        {/* Conversation status pill (speaking / listening) */}
        {lang && mode !== 'voice' && <ConversationStatus lang={lang} />}

        {/* Input — only in hybrid mode */}
        {mode !== 'voice' && (
          <ChatInput onSend={sendMessage}
                     onUpload={() => setShowUpload(true)}
                     loading={loading}
                     lang={lang}
                     disabled={!lang}
                     registerAutoMic={(fn) => { _autoMicRef.current = fn; }} />
        )}
      </div>

      {/* Modals */}
      {showUpload && (
        <PhotoUploadModal
          onUpload={(uri) => { handlePhotoUpload(uri); setShowUpload(false); }}
          onClose={() => setShowUpload(false)} />
      )}
      {showLive && (
        <LiveRecommendModal
          lang={lang || 'en'}
          onCaptured={(uri) => { setShowLive(false); handlePhotoUpload(uri); }}
          onClose={() => setShowLive(false)} />
      )}
      {showCart && (
        <CartModal
          cart={cart}
          onClose={() => setShowCart(false)}
          onRemove={(id) => setCart((prev) => prev.filter((f) => f.id !== id))} />
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   BOOTSTRAP
════════════════════════════════════════════════════════════ */
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
