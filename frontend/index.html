/* ── Deterministic client-side face analysis (no backend needed) ── */
function clientAnalyzeFace(dataUri) {
  let hash = 0;
  const sample = dataUri.slice(22, 622); // skip data URI prefix, sample ~600 chars
  for (let i = 0; i < sample.length; i++) {
    hash = Math.imul(31, hash) + sample.charCodeAt(i) | 0;
  }
  const idx = Math.abs(hash) % CLIENT_FACE_SHAPES.length;
  return { success: true, ...CLIENT_FACE_SHAPES[idx] };
}

/* ── Client-side frame search (no backend needed) ── */
function clientSearchFrames(shape, limit = 6) {
  const shapeLower = (shape || '').toLowerCase();
  let results = shapeLower
    ? CLIENT_FRAMES.filter(f => f.shape_suitability.includes(shapeLower))
    : [...CLIENT_FRAMES];
  if (results.length < 3) results = [...CLIENT_FRAMES];
  results.sort((a, b) => (b.bestseller ? 1 : 0) - (a.bestseller ? 1 : 0) || b.rating - a.rating);
  return results.slice(0, limit);
}

/* ── Client-side tag extractor (mirrors Python heuristics) ── */
function extractTagsFromText(text) {
  const t = (text || '').toLowerCase();
  const tags = {};
  const has = (...words) => words.some(w => t.includes(w));

  // Budget
  if (has('500 se niche','under 500','below 500'))      { tags.budget = 'under_500';  tags.price = 'budget'; }
  else if (has('under 1000','1000 se kam','sasta','cheap')) { tags.budget = 'under_1000'; tags.price = 'budget'; }
  else if (has('under 1500','1500'))                    { tags.budget = 'under_1500'; tags.price = 'budget'; }
  else if (has('under 2000','2000 tak','do hazaar'))    { tags.budget = 'under_2000'; tags.price = 'mid-range'; }
  else if (has('under 2500','2500'))                    { tags.budget = 'under_2500'; tags.price = 'mid-range'; }
  else if (has('under 3000','3000'))                    { tags.budget = 'under_3000'; tags.price = 'mid-range'; }
  else if (has('premium','3500+','luxury','mehnga','above 3000')) { tags.budget = 'above_3000'; tags.price = 'premium'; }
  else if (has('affordable','budget-friendly'))         { tags.budget = 'under_1000'; tags.price = 'budget'; }

  // Vision / product type
  if (has('bina power','zero power','no power','fashion only','sirf style')) tags.vision_need = 'zero_power';
  else if (has('power wala','power chahiye','number wali','single vision','prescription')) tags.vision_need = 'single_vision';
  else if (has('progressive','bifocal','reading')) tags.vision_need = 'progressive';

  if (has('sunglass','goggle','dhoop','uv wali'))        tags.product_type = 'sunglasses';
  else if (has('contact','lens'))                        tags.product_type = 'contact_lens';
  else if (has('chashma','specs','eyeglass'))            tags.product_type = 'eyeglasses';

  // Color type
  if (has('light color','halka rang','light wali','light frame'))       tags.color_type = 'light';
  else if (has('dark color','dark wali','gehra rang','dark frame'))      tags.color_type = 'dark';

  if (has('neutral','black','grey','gray','brown','gunmetal'))  tags.color = 'neutral';
  else if (has('warm','gold','tortoise','amber'))                tags.color = 'warm';
  else if (has('cool','blue','silver'))                          tags.color = 'cool';
  else if (has('bright','bold rang','colorful','statement'))     tags.color = 'statement';

  // Lifestyle / trend
  if (has('office','professional','corporate','formal'))    tags.lifestyle = 'professional';
  else if (has('sport','active','outdoor','gym','khel'))    tags.lifestyle = 'active';
  else if (has('creative','artist'))                        tags.lifestyle = 'creative';
  else if (has('fashion','trendy','stylish','swag'))        tags.lifestyle = 'fashion';

  if (has('classic','timeless'))       tags.trend = 'classic';
  else if (has('bold','statement'))    tags.trend = 'bold';
  else if (has('minimal','simple'))    tags.trend = 'minimal';
  else if (has('trendy','latest'))     tags.trend = 'trendy';

  // Age / gender
  if (has('kids','bachon','children','child'))              tags.age_group = 'kids';
  else if (has('elderly','senior','uncle','aunty','aged'))  tags.age_group = 'aged';
  if (has('ladies','women','female','girls'))               tags.gender_pref = 'female';
  else if (has('gents','men','male','boys','ladkon'))        tags.gender_pref = 'male';

  return tags;
}

/* ── Enrich product from DB format to frontend-compat format ── */

  return {

    rating:        p.rating || p.avg_rating || 4.0,
    reviews:       p.reviews || Math.round((p.avg_rating || 4.0) * 250),
    original_price: p.original_price || p.strikeout_price || p.price,
    bestseller:    p.bestseller ?? (p.tags || []).includes('bestseller'),
    new_arrival:   p.new_arrival ?? (p.tags || []).includes('new-arrival'),
    style:         p.style || p.frame_shape || 'wayfarer',
    color_hex:     p.color_hex || '#00C3C3',
  };
}

// ── Text-to-Speech (backend MP3 primary, browser fallback) ──────────
const TTS_API = `${API}/api/tts`;
let _currentAudio = null;
let _playToken    = null;   // opaque token for the active multi-chunk playback
const _speakState = { listeners: new Set(), speaking: false };

function _setSpeaking(v) {
  _speakState.speaking = v;
  _speakState.listeners.forEach(fn => fn(v));
}
function onSpeakingChange(fn) {
  _speakState.listeners.add(fn);
  return () => _speakState.listeners.delete(fn);
}
function isSpeaking() { return _speakState.speaking; }

// Strip emojis + markdown so TTS doesn't try to vocalise them
function _cleanForSpeech(text) {
  return (text || '')
    .replace(/\*\*(.*?)\*\*/g, '$1')
    .replace(/\*(.*?)\*/g,     '$1')
    .replace(/`([^`]+)`/g,     '$1')
    .replace(/[#>_~]/g,        ' ')
    // Strip anything outside letters / digits / whitespace / basic punctuation
    .replace(/[^\p{L}\p{N}\s.,?!:;'"\-()–—।₹]/gu, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

// Decode base64 → Blob for Audio element
function _b64ToBlob(b64, mime) {
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return new Blob([arr], { type: mime });
}

async function speak(text, lang = 'en', onDone) {
  if (!text || !text.trim()) { if (onDone) onDone(); return; }
  stopSpeaking();
  const cleanText = _cleanForSpeech(text);
  if (!cleanText) { if (onDone) onDone(); return; }

  _setSpeaking(true);
  const finish = () => {
    _setSpeaking(false);
    if (_currentAudio) {
      try { URL.revokeObjectURL(_currentAudio.src); } catch {}
      _currentAudio = null;
    }
    if (onDone) onDone();
  };

  // Fetch chunks from backend
  let payload;
  try {
    const url = `${TTS_API}?lang=${encodeURIComponent(lang)}&text=${encodeURIComponent(cleanText)}`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`TTS HTTP ${resp.status}`);
    payload = await resp.json();
    if (!payload.success || !payload.chunks?.length) throw new Error('no chunks');
  } catch (err) {
    console.warn('[tts] backend failed — using browser voice fallback:', err);
    _browserSpeak(cleanText, lang, finish);
    return;
  }

  // Play each chunk sequentially in one continuous flow
  const mime   = payload.mime || 'audio/mpeg';
  const blobs  = payload.chunks.map(b => _b64ToBlob(b, mime));
  let aborted  = false;
  const token  = {};
  _playToken = token;  // used by stopSpeaking() to abort this session

  for (let i = 0; i < blobs.length; i++) {
    if (aborted || _playToken !== token) break;
    const src = URL.createObjectURL(blobs[i]);
    const audio = new Audio(src);
    audio.preload = 'auto';
    _currentAudio = audio;
    await new Promise((res) => {
      audio.onended = () => { try { URL.revokeObjectURL(src); } catch {}; res(); };
      audio.onerror = () => { try { URL.revokeObjectURL(src); } catch {}; aborted = true; res(); };
      audio.play().catch(() => { aborted = true; res(); });
    });
    if (_playToken !== token) { aborted = true; break; }
  }

  finish();
}

function _browserSpeak(text, lang = 'en', onDone) {
  if (!('speechSynthesis' in window)) { if (onDone) onDone(); return; }
  try { window.speechSynthesis.cancel(); } catch {}
  const u = new SpeechSynthesisUtterance(text);
  u.lang  = I18N[lang]?.code || 'en-IN';
  u.rate  = lang === 'hi' ? 0.95 : 1.0;
  u.pitch = 1.0;
  const voices = window.speechSynthesis.getVoices();
  const match  = voices.find(v => v.lang === u.lang) || voices.find(v => v.lang.startsWith(lang));
  if (match) u.voice = match;
  _setSpeaking(true);
  u.onend   = () => { _setSpeaking(false); if (onDone) onDone(); };
  u.onerror = () => { _setSpeaking(false); if (onDone) onDone(); };
  window.speechSynthesis.speak(u);
}

function stopSpeaking() {
  _playToken = null;  // aborts any pending multi-chunk sequence
  try {
    if (_currentAudio) {
      _currentAudio.pause();
      _currentAudio.currentTime = 0;
      try { URL.revokeObjectURL(_currentAudio.src); } catch {}
    }
  } catch {}
  _currentAudio = null;
  try { window.speechSynthesis.cancel(); } catch {}
  _setSpeaking(false);
}

// ── Voice pitch detector — infer gender from fundamental frequency ──────
// Lightweight autocorrelation on a getUserMedia stream. We average the
// pitch across the utterance; <165 Hz → male, >165 Hz → female. This is a
// rough heuristic but good enough to bias "for me" answers.
async function detectVoiceGender(durationMs = 2500) {
  if (!navigator.mediaDevices?.getUserMedia || !window.AudioContext) return null;
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: {
      echoCancellation: true, noiseSuppression: true,
    }});
  } catch { return null; }
  const ctx = new AudioContext();
  const src = ctx.createMediaStreamSource(stream);
  const analyser = ctx.createAnalyser();
  analyser.fftSize = 2048;
  src.connect(analyser);

  const buf = new Float32Array(analyser.fftSize);
  const sampleRate = ctx.sampleRate;

  function autocorr() {
    analyser.getFloatTimeDomainData(buf);
    let rms = 0;
    for (let i = 0; i < buf.length; i++) rms += buf[i] * buf[i];
    rms = Math.sqrt(rms / buf.length);
    if (rms < 0.01) return null; // too quiet

    // Find first strong correlation peak in a vocal-range lag window
    const minLag = Math.floor(sampleRate / 400); // 400 Hz
    const maxLag = Math.floor(sampleRate / 75);  // 75 Hz
    let bestLag = -1, bestCorr = 0;
    for (let lag = minLag; lag <= maxLag; lag++) {
      let c = 0;
      for (let i = 0; i + lag < buf.length; i++) c += buf[i] * buf[i + lag];
      if (c > bestCorr) { bestCorr = c; bestLag = lag; }
    }
    if (bestLag < 0 || bestCorr < 0.01) return null;
    return sampleRate / bestLag;
  }

  const pitches = [];
  const start   = performance.now();
  return new Promise((resolve) => {
    const tick = () => {
      const p = autocorr();
      if (p && p > 60 && p < 400) pitches.push(p);
      if (performance.now() - start < durationMs) {
        requestAnimationFrame(tick);
      } else {
        stream.getTracks().forEach(t => t.stop());
        try { ctx.close(); } catch {}
        if (pitches.length < 5) return resolve(null);
        pitches.sort((a,b)=>a-b);
        const median = pitches[Math.floor(pitches.length/2)];
        resolve({
          pitch_hz: Math.round(median),
          gender: median < 165 ? 'male' : 'female',
          samples: pitches.length,
        });
      }
    };
    requestAnimationFrame(tick);
  });
}

// ── Speech-to-Text hook ──────────────────────────────────────
// Uses the browser's built-in SpeechRecognition (low latency). We used to
// also route audio to Gemini for higher accuracy, but the extra round-trip
// made the voice UX too slow — rolled back in favour of instant SR.
function useSpeechRecognition(lang = 'en') {
  const [listening, setListening] = useState(false);
  const [transcript, setTranscript] = useState('');
  const recRef   = useRef(null);
  const pitchRef = useRef(null);

  const SR = typeof window !== 'undefined'
    ? (window.SpeechRecognition || window.webkitSpeechRecognition)
    : null;
  const supported = !!SR;

  // Open a parallel mic stream and collect pitch samples for the duration of
  // the speech recognition. Returns a stop() that yields {gender, pitch_hz}.
  const _startPitch = async () => {
    if (!navigator.mediaDevices?.getUserMedia || !window.AudioContext) return null;
    let stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        audio: { echoCancellation: true, noiseSuppression: true },
      });
    } catch { return null; }
    const ctx = new AudioContext();
    const src = ctx.createMediaStreamSource(stream);
    const analyser = ctx.createAnalyser();
    analyser.fftSize = 2048;
    src.connect(analyser);
    const buf = new Float32Array(analyser.fftSize);
    const sr = ctx.sampleRate;
    const pitches = [];

    let raf;
    const tick = () => {
      analyser.getFloatTimeDomainData(buf);
      let rms = 0;
      for (let i = 0; i < buf.length; i++) rms += buf[i] * buf[i];
      rms = Math.sqrt(rms / buf.length);
      if (rms > 0.01) {
        const minLag = Math.floor(sr / 400);
        const maxLag = Math.floor(sr / 75);
        let bestLag = -1, bestCorr = 0;
        for (let lag = minLag; lag <= maxLag; lag++) {
          let c = 0;
          for (let i = 0; i + lag < buf.length; i++) c += buf[i] * buf[i + lag];
          if (c > bestCorr) { bestCorr = c; bestLag = lag; }
        }
        if (bestLag > 0 && bestCorr > 0.01) {
          const p = sr / bestLag;
          if (p > 60 && p < 400) pitches.push(p);
        }
      }
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);

    return {
      stop: () => {
        try { cancelAnimationFrame(raf); } catch {}
        try { stream.getTracks().forEach(t => t.stop()); } catch {}
        try { ctx.close(); } catch {}
        if (pitches.length < 4) return null;
        pitches.sort((a,b)=>a-b);
        const median = pitches[Math.floor(pitches.length/2)];
        return {
          pitch_hz: Math.round(median),
          gender: median < 165 ? 'male' : 'female',
          samples: pitches.length,
        };
      }
    };
  };

  const start = useCallback((onResult, opts = {}) => {
    if (!SR) return;
    if (isSpeaking()) return;   // echo guard
    try { stopSpeaking(); } catch {}

    const rec = new SR();
    rec.lang = I18N[lang]?.code || 'en-IN';
    rec.interimResults = true;
    rec.continuous = false;
    rec.maxAlternatives = 1;

    // Optional pitch capture (runs in parallel for gender inference)
    if (opts.capturePitch) {
      _startPitch().then((p) => { pitchRef.current = p; });
    }

    let final = '';
    rec.onresult = (e) => {
      let interim = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        const r = e.results[i];
        if (r.isFinal) final += r[0].transcript; else interim += r[0].transcript;
      }
      setTranscript(final || interim);
    };
    rec.onend = () => {
      setListening(false);
      const pitchResult = pitchRef.current ? pitchRef.current.stop() : null;
      pitchRef.current = null;
      const out = (final || '').trim();
      if (out && onResult) onResult(out, pitchResult);
    };
    rec.onerror = () => {
      setListening(false);
      if (pitchRef.current) { try { pitchRef.current.stop(); } catch {} pitchRef.current = null; }
    };
    recRef.current = rec;
    setTranscript('');
    setListening(true);
    try { rec.start(); } catch { setListening(false); }
  }, [SR, lang]);

  const stop = useCallback(() => {
    try { recRef.current?.stop?.(); } catch {}
    setListening(false);
  }, []);

  return { listening, transcript, supported, start, stop };
}

/* ═══════════════════════════════════════════════════════════
   VOICE-ONLY VIEW — pulsing waveform, no chat text
════════════════════════════════════════════════════════════ */
function VoiceOnlyView({ lang, onExit, onSend, registerAutoMic,
                          lastAssistant, onFrameSelect, onFitScore,
                          onFitPhotoUploaded, onSelectLens }) {
  const [speaking, setSpeaking] = useState(false);
  useEffect(() => onSpeakingChange(setSpeaking), []);
  const { listening, supported, start, stop } = useSpeechRecognition(lang);

  // Rich components to surface inline (carousel / face / lens / fit-score)
  const richComps = (lastAssistant?.components || []).filter(
    (c) => c.type !== 'quiz'
  );

  // If the pending quiz is the gender question, capture pitch during mic.
  const pendingQuiz = (lastAssistant?.components || []).find(c => c.type === 'quiz');
  const wantPitch   = pendingQuiz?.key === 'gender';

  // Register the auto-mic trigger so the auto-speak effect can open the mic
  useEffect(() => {
    if (!registerAutoMic) return;
    const trigger = () => {
      if (isSpeaking() || listening) return;
      start((t, pitch) => { if (t) onSend(t, 'text', null, null, pitch); },
            { capturePitch: wantPitch });
    };
    registerAutoMic(trigger);
    return () => registerAutoMic(null);
  }, [registerAutoMic, listening, start, onSend, wantPitch]);

  const toggleMic = () => {
    if (listening) { stop(); return; }
    if (speaking)  return;
    start((t, pitch) => { if (t) onSend(t, 'text', null, null, pitch); },
          { capturePitch: wantPitch });
  };

  const state = speaking ? 'speaking' : (listening ? 'listening' : 'idle');
  const label = lang === 'hi'
    ? (state === 'speaking' ? 'Claire बोल रही है…' : state === 'listening' ? 'सुन रही हूँ…' : 'अपना जवाब बोलें')
    : (state === 'speaking' ? 'Claire is speaking…'   : state === 'listening' ? 'Listening…'   : 'Tap to speak');

  // Build 40 animated bars
  const bars = Array.from({length: 40}, (_, i) => i);

  // When results are present, switch to a compact layout: avatar + mic pin
  // to the top, products take the scrollable area. Otherwise use the centred
  // conversation view.
  const hasResults = richComps.length > 0;

  // Shared pieces ------------------------------------------------------------
  const avatarSize = hasResults ? 64 : 140;
  const avatarFont = hasResults ? 28 : 56;
  const micSize    = hasResults ? 56 : 84;
  const micFont    = hasResults ? 22 : 30;

  const avatar = (
    <div style={{
      width: avatarSize, height: avatarSize, borderRadius: '50%',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontSize: avatarFont, flexShrink: 0,
      background: 'linear-gradient(135deg, #00C3C3, #7C3AED)',
      boxShadow: state === 'speaking'
        ? '0 0 40px 12px rgba(0,195,195,0.45)'
        : (state === 'listening' ? '0 0 40px 12px rgba(239,68,68,0.4)' : '0 0 20px rgba(0,195,195,0.2)'),
      animation: state === 'speaking' ? 'glow 1.4s infinite' : 'none',
      transition: 'all .3s ease',
    }}>✨</div>
  );

  const waveform = (
    <div style={{ display: 'flex', alignItems: 'center', gap: 3, height: hasResults ? 28 : 80, flex: 1, maxWidth: 440 }}>
      {bars.map((i) => {
        const delay = (i * 0.035) % 1.2;
        const heightBase = state === 'idle' ? (hasResults ? 3 : 6) : (hasResults ? 6 : 10) + Math.abs(Math.sin(i * 0.4)) * (hasResults ? 8 : 18);
        return (
          <div key={i} style={{
            width: 3, height: heightBase, borderRadius: 2,
            background: state === 'listening' ? '#ef4444' : '#00C3C3',
            opacity: state === 'idle' ? 0.25 : 0.85,
            animation: state !== 'idle' ? `waveBar 0.85s ease-in-out ${delay}s infinite alternate` : 'none',
            transition: 'background .3s',
          }} />
        );
      })}
    </div>
  );

  const micBtn = (
    <button onClick={toggleMic} disabled={speaking || !supported}
      style={{
        width: micSize, height: micSize, borderRadius: '50%',
        fontSize: micFont, border: 'none', cursor: speaking ? 'not-allowed' : 'pointer',
        background: listening
          ? 'linear-gradient(135deg, #ef4444, #991b1b)'
          : 'linear-gradient(135deg, #00C3C3, #005F5F)',
        color: '#fff', boxShadow: '0 10px 40px rgba(0,195,195,0.4)',
        opacity: speaking ? 0.45 : 1,
        flexShrink: 0,
        transition: 'all .2s',
      }}>
      {listening ? '🛑' : '🎤'}
    </button>
  );

  const exitBtn = (
    <button onClick={onExit}
      style={{
        position: 'absolute', top: 16, right: 16, zIndex: 5,
        padding: '6px 12px', borderRadius: 999,
        background: 'rgba(255,255,255,0.06)', color: '#94A3B8',
        border: '1px solid rgba(255,255,255,0.08)', fontSize: 12,
      }}>
      💬 Show chat
    </button>
  );

  // ── Layout A: idle / talking with no results yet — centred hero view ──
  if (!hasResults) {
    return (
      <div style={{
        flex: 1, display: 'flex', flexDirection: 'column',
        alignItems: 'center', justifyContent: 'center',
        background: 'radial-gradient(circle at 50% 40%, rgba(0,195,195,0.15), #070E1C 70%)',
        padding: 24, gap: 32, position: 'relative',
      }}>
        {exitBtn}
        {avatar}
        {waveform}
        <p style={{ fontSize: 18, fontWeight: 600, color: '#E2E8F0', marginTop: -8 }}>{label}</p>
        {micBtn}
        {!supported && (
          <p style={{ fontSize: 12, color: '#f87171' }}>
            {lang === 'hi' ? 'माइक इस ब्राउज़र में उपलब्ध नहीं।' : 'Mic not supported in this browser.'}
          </p>
        )}
      </div>
    );
  }

  // ── Layout B: results present — compact header + scrollable products ──
  return (
    <div style={{
      flex: 1, display: 'flex', flexDirection: 'column',
      background: '#070E1C', position: 'relative',
    }}>
      {exitBtn}
      {/* Sticky voice header */}
      <div style={{
        position: 'sticky', top: 0, zIndex: 4,
        padding: '16px 20px',

/* ═══════════════════════════════════════════════════════════
   QUIZ COMPONENT  (AI-powered — Bedrock analysis + free text)
════════════════════════════════════════════════════════════ */
function QuizComponent({ data, onAnswer, disabled }) {
  const [selected,    setSelected]    = useState(null);
  const [freeText,    setFreeText]    = useState('');
  const [analyzing,   setAnalyzing]   = useState(false);
  const [tagResult,   setTagResult]   = useState(null);
  const [showFree,    setShowFree]    = useState(false);
  const progress = (data.step / data.total) * 100;

  const submitAnswer = async (answer) => {
    if (disabled || selected || analyzing) return;
    setSelected(answer);
    setAnalyzing(true);

    // Call backend quiz-analyze endpoint (non-blocking — falls back gracefully)
    let analysisResult = null;
    try {
      const controller = new AbortController();
      const tid = setTimeout(() => controller.abort(), 5000);
      const resp = await fetch('/api/quiz-analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ response: answer, context: data.question }),
        signal: controller.signal,
      });
      clearTimeout(tid);
      if (resp.ok) {
        analysisResult = await resp.json();
      }
    } catch (_) {
      // Bedrock unavailable — continue without tags
    }

    setTagResult(analysisResult);
    setAnalyzing(false);

    // Short pause to show tags, then fire the answer upstream
    setTimeout(() => onAnswer(answer, data.key, data.step, analysisResult, data), analysisResult ? 900 : 320);
  };

  const handleOptionClick = (opt) => { if (!disabled && !selected) submitAnswer(opt); };
  const handleFreeSubmit  = () => { const v = freeText.trim(); if (v) submitAnswer(v); };
  const handleKeyDown     = (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleFreeSubmit(); } };

  const tags = tagResult?.tags || {};
  const hasAnyTag = Object.values(tags).some(Boolean);
  const isHindi = tagResult && tagResult.detected_language !== 'en' && tagResult.detected_language;

  // When the quiz is already answered (chat history), just show the question
  // text — no progress bar, no option buttons. The user's bubble right below
  // already carries their chosen answer.
  if (disabled) {
    return (
      <div className="fade-up mt-1" style={{ maxWidth: 480 }}>
        <p className="text-sm text-slate-300 leading-snug">{data.question}</p>
      </div>
    );
  }

  return (
    <div className="fade-up mt-2" style={{ maxWidth: 480 }}>
      {/* Progress bar */}
      <div className="flex items-center gap-2 mb-3">
        <div className="flex-1 h-1.5 rounded-full" style={{ background: '#1A3050' }}>
          <div className="h-full rounded-full transition-all duration-500"
               style={{ width: `${progress}%`, background: 'linear-gradient(90deg, #00C3C3, #7C3AED)' }} />
        </div>
        <span className="text-xs text-slate-400">{data.step}/{data.total}</span>
      </div>

      <p className="text-sm font-semibold text-white mb-3 leading-snug">{data.question}</p>

      {/* Subtle hint — the chat input below or the mic picks up the answer. */}
      {!selected && !disabled && !analyzing && (
        <p className="text-xs text-slate-500 italic">
          💬 Reply in the chat below — by voice 🎤 or by typing.
        </p>
      )}

      {/* AI Analysis row — shown while processing */}
      {analyzing && (
        <div className="flex items-center gap-2 mt-3 fade-up">
          <div className="w-4 h-4 rounded-full border-2 spin" style={{ borderColor: '#00C3C3', borderTopColor: 'transparent' }} />
          <span className="text-xs" style={{ color: '#00C3C3' }}>Analysing with AI…</span>
        </div>
      )}

      {/* Tag results strip */}
      {tagResult && !analyzing && (
        <div className="mt-3 fade-up">
          {isHindi && (
            <div className="flex items-start gap-1.5 mb-2 text-xs text-slate-400">
              <span style={{ color: '#F59E0B' }}>🌐</span>
              <span>
                <span style={{ color: '#F59E0B', fontWeight: 600 }}>{tagResult.language_name}</span> detected
                {tagResult.english_translation && tagResult.english_translation !== tagResult.original_response
                  ? <> &mdash; <em style={{ color: '#94A3B8' }}>"{tagResult.english_translation}"</em></>
                  : null}
              </span>
            </div>
          )}
          {hasAnyTag && (
            <div className="flex flex-wrap gap-1.5">
              {Object.entries(tags).map(([cat, val]) =>
                val ? <QuizTagBadge key={cat} category={cat} value={val} /> : null
              )}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── Lightweight photo-upload prompt for on-demand fit score ──────────
// Unlike the Upload Selfie flow, this just grabs a photo and runs fit
// score for a SPECIFIC frame. The ongoing session (quiz answers, cart,
// filters) is untouched — we don't start any mini-quiz.
function FitUploadPrompt({ data, onUploaded, lang = 'en' }) {
  const [uploading, setUploading] = useState(false);
  const fileRef = useRef(null);

  const handleFile = async (e) => {
    const f = e.target.files?.[0];
    if (!f) return;
    setUploading(true);
    const reader = new FileReader();
    reader.onload = () => onUploaded(reader.result, data.frame);
    reader.readAsDataURL(f);
  };

  return (
    <div className="fade-up rounded-2xl p-4"
         style={{ background: '#0D1B2E', border: '1px dashed rgba(0,195,195,.35)', maxWidth: 460 }}>
      <div className="flex items-center gap-3 mb-3">
        <div className="text-2xl">📸</div>
        <div>
          <p className="text-sm font-semibold text-white">
            {lang === 'hi' ? 'एक photo अपलोड करें' : 'Upload a quick photo'}
          </p>
          <p className="text-xs text-slate-400 mt-0.5">
            {lang === 'hi'
              ? 'आपके चेहरे पर frame कैसा लगेगा और साइज़ सही है या नहीं — तुरंत पता चलेगा।'
              : "I'll tell you how this frame looks on your face and whether the size is right."}
          </p>
        </div>
      </div>
      <input ref={fileRef} type="file" accept="image/*" capture="user"
             style={{ display: 'none' }} onChange={handleFile} />
      <button onClick={() => fileRef.current?.click()} disabled={uploading}
              className="w-full px-4 py-2.5 rounded-xl font-semibold btn-teal text-sm disabled:opacity-50">
        {uploading
          ? (lang === 'hi' ? 'भेज रही हूँ…' : 'Uploading…')
          : (lang === 'hi' ? '📷 photo चुनें / लें' : '📷 Choose or take a photo')}
      </button>
      <p className="text-xs text-slate-500 mt-2 text-center">
        {lang === 'hi' ? 'Session वही रहेगा — कोई नई quiz नहीं।'
                        : 'Your current session is kept — no new quiz will start.'}
      </p>
    </div>
  );
}

function FitConfidenceWidget({ data }) {
  const [visible, setVisible] = useState(false);
  useEffect(() => { setTimeout(() => setVisible(true), 100); }, []);

  const score = data.score || 0;
  const radius = 45;
  const circumference = 2 * Math.PI * radius;
  const offset = circumference - (score / 100) * circumference;

  const color = score >= 85 ? '#00C3C3' : score >= 70 ? '#F59E0B' : '#6B7280';
  const verdict = data.verdict || (score >= 85 ? 'Perfect Match' : score >= 70 ? 'Great Fit' : 'Good Fit');

  return (
    <div className="fade-up rounded-2xl p-4" style={{ background: '#0D1B2E', border: '1px solid rgba(0,195,195,.2)', maxWidth: 460 }}>
      <p className="text-sm font-semibold text-slate-300 mb-3">🎯 Fit Analysis — {data.frame_name}</p>
      <div className="flex items-center gap-4">
        {/* Score ring */}
        <div className="relative flex-shrink-0">
          <svg width="100" height="100" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r={radius} fill="none" stroke="#1A3050" strokeWidth="8" />
            <circle cx="50" cy="50" r={radius} fill="none"
                    stroke={color} strokeWidth="8" strokeLinecap="round"
                    strokeDasharray={circumference}
                    strokeDashoffset={visible ? offset : circumference}
                    transform="rotate(-90 50 50)"
                    className="score-arc"
                    style={{ '--dash-offset': offset, transition: 'stroke-dashoffset 1.4s cubic-bezier(.4,0,.2,1)' }} />
            <text x="50" y="46" textAnchor="middle" fontSize="18" fontWeight="700" fill={color}>{score}</text>
            <text x="50" y="60" textAnchor="middle" fontSize="10" fill="#94A3B8">/ 100</text>
          </svg>
        </div>
        {/* Reasons */}
        <div className="flex-1">
          <div className="flex items-center gap-2 mb-2 flex-wrap">
            <span className="text-sm font-bold" style={{ color }}>{verdict}</span>
            {data.size_match && (
              <span className="text-xs px-2 py-0.5 rounded-full font-semibold"
                    style={{
                      background: String(data.size_match).toLowerCase().includes('just')
                        ? 'rgba(0,195,195,0.15)'
                        : 'rgba(245,158,11,0.15)',
                      color: String(data.size_match).toLowerCase().includes('just')
                        ? '#00C3C3' : '#F59E0B',
                      border: '1px solid rgba(0,195,195,0.2)',
                    }}>
                📏 {data.size_match}
              </span>
            )}
          </div>
          {data.reasons && data.reasons.slice(0, 3).map((r, i) => (
            <div key={i} className="flex items-start gap-1.5 mb-1">
              <span className="text-lk-teal text-xs mt-0.5">✓</span>
              <p className="text-xs text-slate-300 leading-snug">{r}</p>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function LensRecommendation({ data, onSelectLens, lang = 'en' }) {
  const [selected,  setSelected]  = useState(null);
  const [confirmed, setConfirmed] = useState(null);
  const packages = data.packages || [];

  const chooseLens = (pkg) => {
    setConfirmed(pkg.id);
    if (onSelectLens) onSelectLens(pkg);
  };

  return (
    <div className="fade-up" style={{ maxWidth: 500 }}>
      {data.reasoning && data.reasoning.length > 0 && (
        <div className="mb-3 p-3 rounded-xl" style={{ background: 'rgba(0,195,195,.07)', border: '1px solid rgba(0,195,195,.15)' }}>
          {data.reasoning.map((r, i) => (
            <p key={i} className="text-xs text-slate-300 leading-relaxed">{r}</p>
          ))}
        </div>
      )}

      <div className="space-y-2">
        {packages.map((pkg, i) => {
          const isSelected = selected === pkg.id;
          return (
            <div key={pkg.id} onClick={() => setSelected(isSelected ? null : pkg.id)}
                 className="rounded-xl cursor-pointer transition-all duration-200"
                 style={{
                   background: isSelected ? 'rgba(0,195,195,.1)' : '#0D1B2E',
                   border: `1.5px solid ${isSelected ? '#00C3C3' : 'rgba(0,195,195,.15)'}`,
                   padding: '12px 14px'
                 }}>
              <div className="flex items-start justify-between gap-3">
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-2 mb-0.5">
                    <span className="font-semibold text-sm text-white">{pkg.name}</span>
                    {pkg.badge && (
                      <span className="text-xs px-2 py-0.5 rounded-full font-medium flex-shrink-0"
                            style={{ background: 'rgba(245,158,11,.2)', color: '#F59E0B' }}>
                        {pkg.badge}
                      </span>
                    )}
                  </div>
                  <p className="text-xs text-slate-400 mb-1.5">{pkg.tagline}</p>
                  {isSelected && (
                    <div className="fade-up">
                      <p className="text-xs text-slate-300 mb-2">{pkg.description}</p>
                      <div className="flex flex-wrap gap-1">
                        {pkg.features.map((f) => (
                          <span key={f} className="text-xs px-2 py-0.5 rounded-full"
                                style={{ background: 'rgba(0,195,195,.1)', color: '#67E8F9' }}>
                            ✓ {f}
                          </span>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
                <div className="text-right flex-shrink-0">
                  <p className="font-bold text-lk-teal text-sm">₹{pkg.price.toLocaleString('en-IN')}</p>
                  <p className="text-xs text-slate-500 line-through">₹{pkg.original_price.toLocaleString('en-IN')}</p>
                  <button className="mt-1.5 text-xs px-3 py-1 rounded-full btn-teal disabled:opacity-50"
                          disabled={confirmed === pkg.id}
                          onClick={(e) => { e.stopPropagation(); chooseLens(pkg); }}>
                    {confirmed === pkg.id
                      ? (lang === 'hi' ? '✓ जोड़ा' : '✓ Added')
                      : (lang === 'hi' ? 'चुनें'  : 'Select')}
                  </button>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ── Polished product-shot renderer ─────────────────────────────────────
// We render the product in-browser as a high-quality SVG scene instead of
// relying on an external CDN. This guarantees the image always matches the
// product's type, shape, and colour (no risk of a sunglass photo landing
// on an eyeglass card, or a random perfume bottle appearing).
//
// The scene consists of:
//   - gradient studio backdrop
//   - soft "table" shadow under the frame
//   - the frame outline in the product's actual colour_hex
//   - tinted lenses for sunglasses / clear for eyeglasses / full lens for contacts
function ProductShot({ frame, width = 260, height = 160 }) {
  const type    = (frame.type || 'eyeglasses').toLowerCase();
  const shape   = (frame.frame_shape || frame.style || 'wayfarer').toLowerCase();
  const color   = frame.color_hex || '#1a1a1a';
  const colorName = (frame.color || '').toLowerCase();

  // Slight warm/cool background tint hinting at the colour family
  const bg = /black|dark|matte|glossy|gunmetal/.test(colorName)   ? ['#2a3449','#1a2438']
           : /gold|amber|tortoise|brown|warm/.test(colorName)     ? ['#3d2f1f','#1a1208']
           : /blue|navy|teal|cool/.test(colorName)                ? ['#1a2840','#0d1a30']
           : /silver|grey|gray|white|clear|transparent/.test(colorName) ? ['#35445d','#1c2538']
           : /red|maroon|pink/.test(colorName)                    ? ['#3b1f25','#1a0d10']
           : /green/.test(colorName)                              ? ['#1e3524','#0d1d12']
           : ['#212b40','#131a2c'];

  // Lens tint varies by product type
  const lensFill = type === 'sunglasses'
    ? (colorName.includes('gold') || colorName.includes('brown') ? 'rgba(120,70,25,0.55)'
       : colorName.includes('blue') ? 'rgba(30,90,160,0.55)'
       : colorName.includes('green') ? 'rgba(50,110,60,0.55)'
       : 'rgba(40,40,50,0.70)')
    : type === 'contact_lens' ? 'rgba(170,210,240,0.45)'
    : 'rgba(235,245,255,0.14)'; // eyeglasses — barely tinted

function FrameCard({ frame, onSelect, onFitScore }) {
  const discount = Math.round((1 - frame.price / frame.original_price) * 100);
  const styleKey  = frame.style || 'wayfarer';

  const colorMap = {
    '#1a1a1a': '#00C3C3', '#c9a84c': '#F59E0B', '#8B4513': '#B8860B',
    '#0d0d0d': '#00C3C3', '#C0C0C0': '#94A3B8', '#B76E79': '#FF6B35',
    '#1e3a5f': '#60A5FA', '#d4eaf7': '#7DD3FC', '#6a0dad': '#A78BFA',
    '#2c3e50': '#94A3B8', '#b8860b': '#F59E0B', 'default': '#00C3C3'
  };
  const svgColor = colorMap[frame.color_hex] || colorMap['default'];

  // Prefer a real product image (the Lenskart catalog's static image_link)
  // and gracefully fall back to the locally-rendered SVG ProductShot when
  // the image fails to load or no URL is present (e.g. offline demo data).
  const realImage = (frame.image_urls && frame.image_urls[0]) || frame.image_url || null;
  const [imgFailed, setImgFailed] = React.useState(false);
  const showRealImage = realImage && !imgFailed && /^https?:\/\//.test(realImage);

  return (
    <div className="snap-start frame-card rounded-2xl overflow-hidden flex-shrink-0"
         style={{ width: 178, background: '#0D1B2E', border: '1px solid rgba(0,195,195,.15)' }}>

      {/* Image area — real catalog image when available, SVG product-shot
          fallback otherwise. */}
      <div className="relative overflow-hidden"
           style={{ height: 140, background: '#0D1B2E' }}>
        {showRealImage ? (
          <img src={realImage} alt={frame.name}
               onError={() => setImgFailed(true)}
               style={{ width: '100%', height: '100%', objectFit: 'contain',
                        background: '#fff' }} />
        ) : (
          <ProductShot frame={frame} width={178} height={140} />

        {frame.bestseller && (

                style={{ background: 'rgba(124,58,237,.25)', color: '#A78BFA' }}>
            New
          </span>
        )}
        {discount > 0 && (
          <span className="absolute bottom-2 right-2 text-xs px-1.5 py-0.5 rounded-full font-bold"
                style={{ background: 'rgba(255,107,53,.25)', color: '#FF6B35' }}>
            -{discount}%

        {/* Rating */}
        <div className="flex items-center gap-1 mb-2">
          <span className="text-yellow-400 text-xs">★</span>
          <span className="text-xs text-slate-300">{frame.rating}</span>
          <span className="text-xs text-slate-500">({(frame.reviews / 1000).toFixed(1)}k)</span>

        <div className="flex items-baseline gap-1.5 mb-3">

        </div>

        {/* Tags */}
        <div className="flex flex-wrap gap-1 mb-3">
          {(frame.tags || []).slice(0, 2).map((tag) => (

                  title="Get fit score">
            🎯
          </button>
        </div>
      </div>
    </div>
  );
}

function ProductCarousel({ data, onSelect, onFitScore }) {
  const scrollRef = useRef(null);
  const [canLeft, setCanLeft]   = useState(false);
  const [canRight, setCanRight] = useState(true);
  const frames = data.frames || [];

  const scroll = (dir) => {
    const el = scrollRef.current;
    if (!el) return;
    el.scrollBy({ left: dir * 190, behavior: 'smooth' });
  };

  const onScroll = () => {
    const el = scrollRef.current;
    if (!el) return;
    setCanLeft(el.scrollLeft > 8);
    setCanRight(el.scrollLeft < el.scrollWidth - el.clientWidth - 8);
  };

  useEffect(() => {
    const el = scrollRef.current;
    if (el) { el.addEventListener('scroll', onScroll); onScroll(); }
    return () => el?.removeEventListener('scroll', onScroll);
  }, []);

  if (!frames.length) return null;

  return (
    <div className="fade-up" style={{ maxWidth: 600 }}>
      {data.title && (
        <p className="text-sm font-semibold text-slate-300 mb-2.5">{data.title}</p>
      )}
      <div className="relative">
        {canLeft && (
          <button onClick={() => scroll(-1)}
                  className="absolute left-0 top-1/2 -translate-y-1/2 -translate-x-3 z-10 w-8 h-8 rounded-full flex items-center justify-center text-white text-sm"
                  style={{ background: '#0D1B2E', border: '1px solid rgba(0,195,195,.3)', boxShadow: '0 2px 12px rgba(0,0,0,.4)' }}>
            ‹
          </button>
        )}
        <div ref={scrollRef} className="carousel-scroll flex gap-3 pb-2">
          {frames.map((frame) => (
            <FrameCard key={frame.id} frame={frame}
                       onSelect={onSelect} onFitScore={onFitScore} />
          ))}
        </div>
        {canRight && (
          <button onClick={() => scroll(1)}
                  className="absolute right-0 top-1/2 -translate-y-1/2 translate-x-3 z-10 w-8 h-8 rounded-full flex items-center justify-center text-white text-sm"
                  style={{ background: '#0D1B2E', border: '1px solid rgba(0,195,195,.3)', boxShadow: '0 2px 12px rgba(0,0,0,.4)' }}>
            ›
          </button>
        )}
      </div>
      <p className="text-xs text-slate-500 mt-1.5">Swipe or use arrows to browse • 🎯 for fit analysis</p>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   FILTERABLE CAROUSEL — carousel + live filter chips
════════════════════════════════════════════════════════════ */
function FilterableCarousel({ data, onSelect, onFitScore }) {
  const [frames, setFrames]           = useState(data.frames || []);
  const [activePrice, setActivePrice] = useState(null);
  const [activeType, setActiveType]   = useState(null);
  const [activeColor, setActiveColor] = useState(null);
  const [searching, setSearching]     = useState(false);
  const [noMatch, setNoMatch]         = useState(false);
  const [matchCount, setMatchCount]   = useState(null);

  const hasActive = activePrice || activeType || activeColor;

  const runSearch = async (price, type, color) => {
    // Reset to originals when all cleared
    if (!price && !type && !color) {
      setFrames(data.frames || []);
      setNoMatch(false);
      setMatchCount(null);
      return;
    }

    setSearching(true);
    setNoMatch(false);

    const quizTags = {};
    if (price) quizTags.budget = price;
    if (color) quizTags.color_type = color;

    const body = { quiz_tags: quizTags };
    if (type) body.filters = { type };

    try {
      const ctrl = new AbortController();
      setTimeout(() => ctrl.abort(), 3500);
      const res  = await fetch(`${API}/api/search`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
        signal: ctrl.signal,
      });
      const result = await res.json();

      if (result.no_match || !(result.products || result.frames || []).length) {
        setNoMatch(true);
        setFrames([]);
        setMatchCount(0);
      } else {
        const raw = result.products || result.frames || [];
        setFrames(raw.map(enrichProduct));
        setMatchCount(result.total_found || raw.length);
        setNoMatch(false);
      }
    } catch {
      // Client-side fallback — search the broader CLIENT_FRAMES pool
      const pool = (typeof CLIENT_FRAMES !== 'undefined' && CLIENT_FRAMES.length)
        ? CLIENT_FRAMES : (data.frames || []);
      let filtered = [...pool];
      if (price) {
        const chip = PRICE_CHIPS.find(c => c.tag === price);
        if (chip?.max) filtered = filtered.filter(f => (f.price || 0) <= chip.max);
        if (chip?.min) filtered = filtered.filter(f => (f.price || 0) >= chip.min);
      }
      if (color) {
        const MAP = { dark:['black','navy','gunmetal','matte'], light:['clear','white','silver','rose','gold'], warm:['tortoise','brown','gold','amber'], cool:['blue','silver','grey','teal'] };
        const cols = MAP[color] || [];
        if (cols.length) filtered = filtered.filter(f => cols.some(c => (f.color||'').toLowerCase().includes(c)));
      }
      if (type) filtered = filtered.filter(f => (f.type || 'eyeglasses') === type);
      setFrames(filtered.slice(0, 6));
      setNoMatch(filtered.length === 0);
      setMatchCount(filtered.length);
    }
    setSearching(false);
  };

  const toggle = (category, value) => {
    let p = activePrice, tp = activeType, co = activeColor;
    if (category === 'price') p  = p  === value ? null : value;
    if (category === 'type')  tp = tp === value ? null : value;
    if (category === 'color') co = co === value ? null : value;
    setActivePrice(p); setActiveType(tp); setActiveColor(co);
    runSearch(p, tp, co);
  };

  const clearAll = () => {
    setActivePrice(null); setActiveType(null); setActiveColor(null);
    setFrames(data.frames || []); setNoMatch(false); setMatchCount(null);
  };

  const chip = (active, onClick, label) => (
    <button onClick={onClick}
      className="text-xs px-2.5 py-1 rounded-full transition-all whitespace-nowrap"
      style={active
        ? { background:'#00C3C3', color:'#fff', fontWeight:600, border:'1px solid #00C3C3' }
        : { background:'rgba(255,255,255,0.06)', color:'#94A3B8', border:'1px solid rgba(255,255,255,0.1)' }
      }>
      {label}
    </button>
  );

  return (
    <div className="fade-up" style={{ maxWidth: 600 }}>
      {/* Title is rendered by ProductCarousel below — avoid duplicate */}

      {/* ── Filter bar ── */}
      <div className="mb-3 space-y-1.5">
        {/* Price row */}
        <div className="flex flex-wrap gap-1.5">
          {PRICE_CHIPS.map(f => chip(activePrice === f.tag, () => toggle('price', f.tag), f.label))}
        </div>
        {/* Type + Color row */}
        <div className="flex flex-wrap gap-1.5">
          {TYPE_CHIPS.map(f  => chip(activeType  === f.value, () => toggle('type',  f.value), f.label))}
          {COLOR_CHIPS.map(f => chip(activeColor === f.value, () => toggle('color', f.value), f.label))}
        </div>
        {/* Summary row */}
        {hasActive && (
          <div className="flex items-center gap-2 pt-0.5">
            <span className="text-xs" style={{ color:'#00C3C3' }}>
              {searching ? '🔍 Searching…' : noMatch ? '0 results' : `${matchCount ?? frames.length} results`}
            </span>
            <button onClick={clearAll} className="text-xs text-slate-500 hover:text-slate-300 underline">
              Clear all
            </button>
          </div>
        )}
      </div>

      {/* ── Results ── */}
      {searching ? (
        <div className="flex gap-2 py-3">
          {[0,1,2].map(i => (
            <div key={i} className="rounded-xl flex-shrink-0" style={{ width:164, height:220, background:'rgba(255,255,255,0.04)', animation:'shimmer 1.2s infinite' }} />
          ))}
        </div>
      ) : noMatch ? (
        <div className="glass rounded-xl p-5 text-center" style={{ maxWidth:320 }}>
          <p className="text-2xl mb-1.5">🔍</p>
          <p className="text-sm font-semibold text-white mb-1">No products match these filters</p>
          <p className="text-xs text-slate-400 mb-3">Try removing a filter or changing your selection</p>
          <button onClick={clearAll}
            className="text-xs px-3 py-1.5 rounded-full font-semibold"
            style={{ background:'#00C3C3', color:'#fff' }}>
            Reset filters
          </button>
        </div>
      ) : (
        <ProductCarousel data={{ ...data, frames }} onSelect={onSelect} onFitScore={onFitScore} />
      )}
    </div>
  );
}

function MessageBubble({ msg, onAnswer, onFrameSelect, onFitScore, onFitPhotoUploaded, onSelectLens, lang = 'en' }) {
  const isUser = msg.role === 'user';
  const text   = msg.text || msg.content || '';
  const comps  = msg.components || [];

  // Format markdown-ish text (bold, italic)
  function formatText(t) {
    return t
      .replace(/\*\*(.*?)\*\*/g, '<strong class="text-white">$1</strong>')
      .replace(/\*(.*?)\*/g, '<em class="text-lk-teal not-italic font-medium">$1</em>')
      .replace(/\n/g, '<br/>');
  }

  if (isUser) {
    if (msg.type === 'image') {
      return (
        <div className="flex justify-end msg-enter">
          <div className="rounded-2xl rounded-br-sm overflow-hidden" style={{ maxWidth: 240, border: '2px solid rgba(0,195,195,.3)' }}>
            <img src={msg.content} alt="Uploaded" className="w-full object-cover" style={{ maxHeight: 200 }} />
            <div className="px-3 py-2 text-xs text-slate-400" style={{ background: '#0D1B2E' }}>
              📸 Photo uploaded for face analysis
            </div>
          </div>
        </div>
      );
    }
    return (
      <div className="flex justify-end msg-enter">
        <div className="rounded-2xl rounded-br-sm px-4 py-2.5 text-sm max-w-xs"
             style={{ background: 'linear-gradient(135deg, #00C3C3, #005F5F)', color: '#fff' }}>
          {text}
        </div>
      </div>
    );
  }

  // Assistant message
  return (
    <div className="flex items-start gap-2.5 msg-enter">
      {/* Avatar */}
      <div className="w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 mt-0.5 pulse-glow"
           style={{ background: 'linear-gradient(135deg, #00C3C3, #7C3AED)', fontSize: 16 }}>
        ✨
      </div>

      <div className="flex-1 space-y-3" style={{ maxWidth: 'calc(100% - 44px)' }}>
        {/* Text portion — hide if empty, or if the QuizComponent below will
            already render the question (avoids duplicate copy in chat view). */}
        {text && text.trim() && (() => {
          const hasQuiz = (msg.components || []).some(c => c.type === 'quiz');
          const textIsShortAck = text.trim().length < 60 && !/\?/.test(text);
          // If a quiz is attached, only show text bubble when it's a short ack
          if (hasQuiz && !textIsShortAck) return null;
          return (
            <div className="glass rounded-2xl rounded-tl-sm px-4 py-3 text-sm text-slate-200 leading-relaxed relative group"
                 style={{ display: 'inline-block', maxWidth: '100%' }}>
              <div dangerouslySetInnerHTML={{ __html: formatText(text) }} />
              <button onClick={() => {
                        const q = (msg.components || []).find(c => c.type === 'quiz');
                        speak(q ? q.question : text, lang);
                      }}
                      title={lang === 'hi' ? 'फिर से सुनें' : 'Replay'}
                      className="ml-2 text-xs opacity-60 hover:opacity-100 transition-opacity"
                      style={{ color: '#00C3C3' }}>
                🔊
              </button>
            </div>
          );
        })()}

        {/* Rich components */}
        {comps.map((comp, i) => {
          switch (comp.type) {
            case 'quiz':
              return <QuizComponent key={i} data={comp} onAnswer={onAnswer} disabled={msg.answered} />;
            case 'carousel':
              return <ProductCarousel key={i} data={comp} onSelect={onFrameSelect} onFitScore={onFitScore} />;
            case 'face_analysis':
              return <FaceAnalysisCard key={i} data={comp} />;
            case 'lens_rec':
              return <LensRecommendation key={i} data={comp} onSelectLens={onSelectLens} lang={lang} />;
            case 'fit_score':
              return <FitConfidenceWidget key={i} data={comp} />;
            case 'fit_upload':
              return <FitUploadPrompt key={i} data={comp} onUploaded={onFitPhotoUploaded} lang={lang} />;
            default:
              return null;
          }
        })}

        {/* Timestamp */}
        <p className="text-xs text-slate-600 pl-1">{msg.time}</p>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════
   LIVE RECOMMENDATION MODAL — webcam, 3s capture, LLM analysis
════════════════════════════════════════════════════════════ */
function LiveRecommendModal({ onCaptured, onClose, lang = 'en' }) {
  const videoRef  = useRef(null);
  const canvasRef = useRef(null);
  const streamRef = useRef(null);
  const [status,   setStatus]   = useState('starting');  // starting|ready|capturing|error
  const [countdown, setCountdown] = useState(3);
  const [errMsg,   setErrMsg]   = useState('');

  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: 640, height: 480 },
          audio: false,
        });
        if (cancelled) { stream.getTracks().forEach(t => t.stop()); return; }
        streamRef.current = stream;
        if (videoRef.current) videoRef.current.srcObject = stream;
        setStatus('ready');
      } catch (e) {
        setStatus('error');
        setErrMsg(lang === 'hi' ? 'कैमरा एक्सेस नहीं मिला' : 'Camera access denied');
      }
    })();
    return () => {
      cancelled = true;
      streamRef.current?.getTracks().forEach((t) => t.stop());
    };
  }, [lang]);

  const capture = async () => {
    setStatus('capturing');
    // Friendly 3-2-1 countdown
    for (let c = 3; c > 0; c--) {
      setCountdown(c);
      await new Promise(r => setTimeout(r, 700));
    }
    // Grab a frame from the video
    const v = videoRef.current;
    const c = canvasRef.current;
    if (!v || !c) { setStatus('error'); return; }
    c.width  = v.videoWidth  || 640;
    c.height = v.videoHeight || 480;
    c.getContext('2d').drawImage(v, 0, 0, c.width, c.height);
    const dataUri = c.toDataURL('image/jpeg', 0.85);
    streamRef.current?.getTracks().forEach((t) => t.stop());
    onCaptured(dataUri);
  };

  return (
    <div style={{
      position: 'fixed', inset: 0, zIndex: 9999,
      background: 'rgba(7,14,28,0.94)', backdropFilter: 'blur(8px)',
      display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 16,
    }}>
      <div className="glass rounded-2xl p-5 w-full"
           style={{ maxWidth: 520, border: '1.5px solid rgba(0,195,195,0.35)' }}>
        <div className="flex items-center justify-between mb-3">
          <p className="text-base font-bold text-white">
            {lang === 'hi' ? '🎥 लाइव रेकमेंडेशन' : '🎥 Live Recommendation'}
          </p>
          <button onClick={() => {
                    streamRef.current?.getTracks().forEach((t) => t.stop());
                    onClose();
                  }}
                  className="text-slate-400 hover:text-white" style={{ fontSize: 20 }}>
            ✕
          </button>
        </div>

        <div style={{
          position: 'relative', width: '100%', aspectRatio: '4/3',
          borderRadius: 12, overflow: 'hidden',
          background: '#000', border: '1px solid rgba(0,195,195,0.25)',
        }}>
          <video ref={videoRef} autoPlay playsInline muted
                 style={{ width: '100%', height: '100%', objectFit: 'cover', transform: 'scaleX(-1)' }} />
          <canvas ref={canvasRef} style={{ display: 'none' }} />
          {status === 'capturing' && (
            <div style={{
              position: 'absolute', inset: 0, display: 'flex',
              alignItems: 'center', justifyContent: 'center',
              background: 'rgba(0,0,0,0.35)',
            }}>
              <div style={{
                width: 120, height: 120, borderRadius: '50%',
                background: 'rgba(0,195,195,0.25)',
                border: '3px solid #00C3C3',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: 56, fontWeight: 700, color: '#fff',
              }}>{countdown}</div>
            </div>
          )}
          {status === 'error' && (
            <div style={{
              position: 'absolute', inset: 0,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              color: '#f87171', fontSize: 14, textAlign: 'center', padding: 24,
            }}>
              {errMsg}
            </div>
          )}
        </div>

        <p className="text-xs text-slate-400 mt-3 text-center">
          {lang === 'hi'
            ? 'कैमरे के सामने सीधे देखें, फिर Capture दबाएँ।'
            : 'Look straight at the camera, then tap Capture.'}
        </p>

        <button onClick={capture}
                disabled={status !== 'ready'}
                className="w-full mt-3 py-3 rounded-xl font-semibold text-sm btn-teal disabled:opacity-40">
          {status === 'starting' ? (lang === 'hi' ? 'कैमरा चालू हो रहा है…' : 'Starting camera…')
           : status === 'capturing' ? (lang === 'hi' ? 'कैप्चर हो रहा है…' : 'Capturing…')
           : (lang === 'hi' ? '📸 Capture & Analyse' : '📸 Capture & Analyse')}
        </button>
      </div>
    </div>
  );
}

function PhotoUploadModal({ onUpload, onClose }) {
  const fileRef  = useRef(null);
  const [drag, setDrag] = useState(false);
  const [preview, setPreview] = useState(null);
  const [loading, setLoading] = useState(false);

  const handleFile = (file) => {
    if (!file || !file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = (e) => setPreview(e.target.result);
    reader.readAsDataURL(file);
  };

  const handleDrop = (e) => {
    e.preventDefault();
    setDrag(false);
    handleFile(e.dataTransfer.files[0]);
  };

  const confirm = () => {
    if (!preview) return;
    setLoading(true);
    setTimeout(() => { onUpload(preview); onClose(); }, 300);
  };

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center p-4"
         style={{ background: 'rgba(0,0,0,.75)', backdropFilter: 'blur(8px)' }}>
      <div className="rounded-2xl w-full" style={{ maxWidth: 400, background: '#0D1B2E', border: '1px solid rgba(0,195,195,.25)' }}>
        {/* Header */}
        <div className="flex items-center justify-between px-5 py-4" style={{ borderBottom: '1px solid rgba(0,195,195,.1)' }}>
          <div>
            <h3 className="font-bold text-white">Face Shape Analysis</h3>
            <p className="text-xs text-slate-400 mt-0.5">Upload a clear selfie for personalized frame picks</p>
          </div>
          <button onClick={onClose} className="text-slate-500 hover:text-white text-xl leading-none">×</button>
        </div>

        <div className="p-5">
          {!preview ? (
            <div className={`rounded-xl flex flex-col items-center justify-center gap-3 cursor-pointer transition-all duration-200 ${drag ? 'drag-active' : ''}`}
                 style={{ border: '2px dashed rgba(0,195,195,.25)', background: 'rgba(0,195,195,.03)', padding: '40px 20px' }}
                 onClick={() => fileRef.current?.click()}
                 onDragOver={(e) => { e.preventDefault(); setDrag(true); }}
                 onDragLeave={() => setDrag(false)}
                 onDrop={handleDrop}>
              <div className="text-4xl">📸</div>
              <div className="text-center">
                <p className="font-semibold text-white text-sm">Drop your photo here</p>
                <p className="text-xs text-slate-400 mt-1">or click to browse • JPG, PNG, WEBP</p>
              </div>
              <p className="text-xs text-slate-500 text-center">For best results: face the camera directly, ensure good lighting</p>
              <input ref={fileRef} type="file" accept="image/*" className="hidden"
                     onChange={(e) => handleFile(e.target.files[0])} />
            </div>
          ) : (
            <div className="text-center">
              <div className="relative inline-block">
                <img src={preview} alt="Preview" className="rounded-xl object-cover mx-auto"
                     style={{ width: 200, height: 200 }} />
                <button onClick={() => setPreview(null)}
                        className="absolute top-2 right-2 w-7 h-7 rounded-full flex items-center justify-center text-sm"
                        style={{ background: 'rgba(0,0,0,.7)', color: '#fff' }}>
                  ×
                </button>
              </div>
              <p className="text-xs text-slate-400 mt-2">Looking good! Claire will analyze your face shape.</p>
            </div>
          )}

          {/* Tips */}
          <div className="mt-3 grid grid-cols-3 gap-2">
            {['😊 Face forward', '💡 Good lighting', '🤳 Clear background'].map((tip) => (
              <div key={tip} className="text-center p-2 rounded-lg text-xs text-slate-400"
                   style={{ background: 'rgba(0,195,195,.04)', border: '1px solid rgba(0,195,195,.08)' }}>
                {tip}
              </div>
            ))}
          </div>
        </div>

        <div className="px-5 pb-5 flex gap-2">
          <button onClick={onClose} className="flex-1 py-2.5 rounded-xl text-sm btn-ghost">Cancel</button>
          <button onClick={confirm} disabled={!preview || loading}
                  className="flex-1 py-2.5 rounded-xl text-sm btn-teal disabled:opacity-40 disabled:cursor-not-allowed flex items-center justify-center gap-2">
            {loading ? <><span className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full spin" />Analyzing...</>
                     : '✨ Analyze My Face'}
          </button>
        </div>
      </div>
    </div>
  );
}

        <p className="text-xs text-slate-600 text-center">Powered by Claire AI</p>

  );
